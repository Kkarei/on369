      <button class="btn primary" id="itemSave">Save</button>
    </div>
  </div>
</div>

<!-- App Picker Modal -->
<div class="overlay" id="appPickerOverlay">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="appPickerTitle">
    <h3 id="appPickerTitle">Add an app</h3>
    <div id="appPickerList"></div>
    <div class="modal-actions">
      <button class="btn" id="appPickerCancel">Cancel</button>
    </div>
  </div>
</div>

<!-- Folder View -->
<div id="folderOverlay">
  <div id="folderPanel" role="dialog" aria-modal="true" aria-labelledby="folderTitle">
    <div id="folderHeader">
      <h3 id="folderTitle"></h3>
      <div class="iconbtn" id="folderClose" role="button" tabindex="0" aria-label="Close folder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"></path></svg>
      </div>
    </div>
    <div id="folderBody"></div>
  </div>
</div>

<script>
(function(){
  "use strict";

  /* ============ STATE ============ */
  const STORAGE_KEY = "on369.state.v1";
  const COLORS = ["#7c9fff","#f2a65a","#6bd1a0","#ea6b83","#c792ea","#57c7d4"];

  // Built-in apps live here. Each entry needs: name, an icon(color)->svg fn,
  // a default/min window size, and a render(bodyEl, winId) that builds its UI.
  const APP_REGISTRY = {
    calculator: {
      name: "Calculator",
      defaultWidth: 300, defaultHeight: 420,
      minWidth: 260, minHeight: 360,
      icon: calculatorSVG,
      render: renderCalculatorApp
    },
    todo: {
      name: "Todo",
      defaultWidth: 320, defaultHeight: 460,
      minWidth: 260, minHeight: 320,
      icon: todoSVG,
      render: renderTodoApp
    }
  };

  function uid(){ return Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4); }

  function seedState(){
    return {
      theme: "daylight",
      wallpaper: "dots",
      searchEngine: "google",
      builtinAppsSeeded: true,
      defaultThemeMigrated: true,
      icons: [
        { id: uid(), type:"app", appId:"calculator", label:"Calculator", color: COLORS[5], x:0, y:0, parentId:null },
        { id: uid(), type:"app", appId:"todo", label:"Todo", color: COLORS[2], x:1, y:0, parentId:null },
        { id: uid(), type:"folder", label:"Getting Started", color: COLORS[1], x:2, y:0, parentId:null },
        { id: uid(), type:"bookmark", label:"GitHub", url:"https://github.com", color: COLORS[0], x:3, y:0, parentId:null },
        { id: uid(), type:"bookmark", label:"Anthropic Docs", url:"https://docs.claude.com", color: COLORS[0], x:0, y:1, parentId:null },
        { id: uid(), type:"folder", label:"Read Later", color: COLORS[3], x:1, y:1, parentId:null },
        { id: uid(), type:"bookmark", label:"Welcome — right-click me!", url:"https://start.me", color: COLORS[2], x:2, y:1, parentId:null }
      ]
    };
  }

  function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return seedState();
      const parsed = JSON.parse(raw);
      if(!parsed.icons) return seedState();
      if(!parsed.searchEngine) parsed.searchEngine = "google";
      return parsed;
    }catch(e){
      console.warn("on369: state load failed, reseeding", e);
      return seedState();
    }
  }

  let state = loadState();
  let currentFolderId = null; // null = root desktop

  function save(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    catch(e){ console.warn("on369: save failed", e); }
  }

  // One-time migration: guarantee Calculator + Todo are on the desktop even for
  // pre-existing saved state (from before these apps existed). Runs once — after
  // that, deleting one is a real, respected choice rather than getting re-added
  // on every reload.
  function ensureBuiltinApps(){
    if(state.builtinAppsSeeded) return;
    const existingAppIds = new Set(state.icons.filter(i=>i.type==="app").map(i=>i.appId));
    const wanted = [
      { appId:"calculator", label:"Calculator", color: COLORS[5] },
      { appId:"todo", label:"Todo", color: COLORS[2] }
    ];
    wanted.forEach(w=>{
      if(!existingAppIds.has(w.appId)){
        const slot = nextFreeSlot(null);
        state.icons.push({ id: uid(), type:"app", appId:w.appId, label:w.label, color:w.color, x:slot.x, y:slot.y, parentId:null });
      }
    });
    state.builtinAppsSeeded = true;
    save();
  }
  ensureBuiltinApps();

  // One-time default-theme migration: daylight is now the app default. Existing
  // saved sessions get switched once; after that, an explicit theme choice
  // (including switching back to noctis) always sticks.
  if(!state.defaultThemeMigrated){
    state.theme = "daylight";
    state.defaultThemeMigrated = true;
    save();
  }

  save(); // guarantee first-ever load is persisted immediately, not only after the user's first action

  /* ============ DOM REFS ============ */
  const gridLayer = document.getElementById("gridLayer");
  const desktop = document.getElementById("desktop");
  const rubberband = document.getElementById("rubberband");
  const emptyHint = document.getElementById("emptyHint");
  const statusEl = document.getElementById("status");
  const folderOverlay = document.getElementById("folderOverlay");
  const folderBody = document.getElementById("folderBody");
  const folderTitle = document.getElementById("folderTitle");
  const windowLayer = document.getElementById("windowLayer");
  const taskbar = document.getElementById("taskbar");

  function getCellSize(){
    const cs = getComputedStyle(document.documentElement);
    return {
      w: parseFloat(cs.getPropertyValue("--cell-w")) || 104,
      h: parseFloat(cs.getPropertyValue("--cell-h")) || 118
    };
  }

  // Absolutely-positioned children align to their relative parent's PADDING
  // EDGE, which is the same point as the parent's top-left corner would be
  // with zero padding — CSS padding never actually offsets them. So the gap
  // below the fixed topbar/searchbar has to be a real pixel offset applied
  // to each icon's left/top here, not padding on #gridLayer.
  function getGridOffset(parentId){
    if(parentId !== null){
      return { top: 20, left: 20 }; // matches folderBody's visual inset
    }
    const cs = getComputedStyle(document.documentElement);
    const topbarH = parseFloat(cs.getPropertyValue("--topbar-h")) || 44;
    const searchH = parseFloat(cs.getPropertyValue("--searchbar-h")) || 58;
    const safeTop = parseFloat(cs.getPropertyValue("--safe-top")) || 0;
    const safeLeft = parseFloat(cs.getPropertyValue("--safe-left")) || 0;
    const isMobile = window.innerWidth <= 640;
    return {
      top: topbarH + safeTop + searchH + 22,
      left: (isMobile ? 12 : 24) + safeLeft
    };
  }

  const isCoarsePointer = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;

  let selected = new Set();
  let activeCtxMenu = null;

  /* ============ THEME / WALLPAPER ============ */
  const THEMES = [
    { id:"noctis",   name:"Noctis",   bg:"#0c0e13", bg2:"#1b2033", accent:"#7c9fff" },
    { id:"daylight", name:"Daylight", bg:"#eef0f4", bg2:"#cfd6e8", accent:"#4f6fe0" },
    { id:"dune",     name:"Dune",     bg:"#201a14", bg2:"#3a2c1c", accent:"#d4a054" },
    { id:"graphite", name:"Graphite", bg:"#1b1e23", bg2:"#2c3038", accent:"#8fa0b8" },
    { id:"verdant",  name:"Verdant",  bg:"#0f1a14", bg2:"#1c3226", accent:"#6cc499" }
  ];

  const themeGrid = document.getElementById("themeGrid");
  THEMES.forEach(t=>{
    const card = document.createElement("div");
    card.className = "theme-card";
    card.dataset.theme = t.id;
    card.innerHTML = `<div class="theme-swatch" style="background:linear-gradient(135deg, ${t.bg}, ${t.bg2})"><span class="dot" style="background:${t.accent}"></span></div><span class="theme-name">${t.name}</span>`;
    card.addEventListener("click", ()=>{ state.theme = t.id; applyAppearance(); save(); });
    themeGrid.appendChild(card);
  });

  function applyAppearance(){
    document.documentElement.setAttribute("data-theme", state.theme);
    document.documentElement.setAttribute("data-wallpaper", state.wallpaper);
    document.querySelectorAll(".theme-card").forEach(s=>{
      s.classList.toggle("active", s.dataset.theme === state.theme);
    });
    document.querySelectorAll(".wp-swatch").forEach(s=>{
      s.classList.toggle("active", s.dataset.wp === state.wallpaper);
    });
  }

  document.getElementById("settingsBtn").addEventListener("click", (e)=>{
    e.stopPropagation();
    document.getElementById("settingsPop").classList.toggle("open");
  });
  document.querySelectorAll(".wp-swatch").forEach(s=>{
    s.addEventListener("click", ()=>{ state.wallpaper = s.dataset.wp; applyAppearance(); save(); });
  });
  document.addEventListener("click", (e)=>{
    const pop = document.getElementById("settingsPop");
    if(pop.classList.contains("open") && !pop.contains(e.target) && e.target.id !== "settingsBtn"){
      pop.classList.remove("open");
    }
  });

  /* ============ CLOCK ============ */
  function tickClock(){
    const now = new Date();
    const time = now.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
    const date = now.toLocaleDateString([], {weekday:"short", month:"short", day:"numeric"});
    document.querySelector("#clock .time").textContent = time;
    document.querySelector("#clock .date").textContent = date;
  }
  tickClock();
  setInterval(tickClock, 15000);

  /* ============ ICON GLYPHS ============ */
  function folderSVG(color){
    return `<svg viewBox="0 0 24 24" fill="none"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7Z" fill="${color}" opacity="0.9"/><path d="M3 9h18" stroke="rgba(0,0,0,0.15)" stroke-width="1"/></svg>`;
  }
  function linkSVG(color){
    return `<svg viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.07 0l2-2a5 5 0 0 0-7.07-7.07l-1 1"></path><path d="M14 11a5 5 0 0 0-7.07 0l-2 2a5 5 0 0 0 7.07 7.07l1-1"></path></svg>`;
  }
  function calculatorSVG(color){
    return `<svg viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2.5"></rect><line x1="8" y1="6.5" x2="16" y2="6.5"></line><circle cx="8" cy="11.5" r="1" fill="${color}" stroke="none"></circle><circle cx="12" cy="11.5" r="1" fill="${color}" stroke="none"></circle><circle cx="16" cy="11.5" r="1" fill="${color}" stroke="none"></circle><circle cx="8" cy="15.5" r="1" fill="${color}" stroke="none"></circle><circle cx="12" cy="15.5" r="1" fill="${color}" stroke="none"></circle><circle cx="16" cy="15.5" r="1" fill="${color}" stroke="none"></circle><circle cx="8" cy="19" r="1" fill="${color}" stroke="none"></circle><circle cx="12" cy="19" r="1" fill="${color}" stroke="none"></circle><circle cx="16" cy="19" r="1" fill="${color}" stroke="none"></circle></svg>`;
  }
  function todoSVG(color){
    return `<svg viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3.5" width="7" height="7" rx="1.5"></rect><path d="M5 7l1.3 1.3L8.5 5.8"></path><rect x="3" y="13.5" width="7" height="7" rx="1.5"></rect><path d="M5 17l1.3 1.3 2.2-2.5"></path><line x1="13" y1="7" x2="21" y2="7"></line><line x1="13" y1="17" x2="21" y2="17"></line></svg>`;
  }

  function faviconDomain(url){
    try{ return new URL(url).hostname; }
    catch(e){ return null; }
  }

  function glyphFor(item){
    if(item.type === "folder"){
      const count = childrenOf(item.id).length;
      const badge = count > 0 ? `<span class="count-badge">${count > 99 ? "99+" : count}</span>` : "";
      return `<div class="glyph-wrap"><div class="icon-glyph" style="background:${item.color}22;border-color:${item.color}55">${folderSVG(item.color)}</div>${badge}</div>`;
    }
    if(item.type === "app"){
      const app = APP_REGISTRY[item.appId];
      const svg = app ? app.icon(item.color) : linkSVG(item.color);
      return `<div class="glyph-wrap"><div class="icon-glyph" style="background:${item.color}1a;border-color:${item.color}55">${svg}</div></div>`;
    }
    const domain = faviconDomain(item.url);
    const fallback = linkSVG(item.color);
    if(domain){
      // Three-tier pictorial fallback: DuckDuckGo's icon service errors cleanly on a
      // real miss (so onerror actually fires), Google's s2 service has broad coverage
      // but silently returns a generic placeholder instead of erroring, and our own
      // colored glyph is the guaranteed-to-render last resort.
      const tier1 = `https://icons.duckduckgo.com/ip3/${domain}.ico`;
      const tier2 = `https://www.google.com/s2/favicons?sz=128&domain=${domain}`;
      const fallbackEscaped = fallback.replace(/`/g,"'").replace(/"/g,"&quot;");
      return `<div class="glyph-wrap"><div class="icon-glyph" style="border-color:${item.color}55">
        <img src="${tier1}" alt="" onerror="this.onerror=function(){this.replaceWith(Object.assign(document.createElement('span'),{innerHTML:\`${fallbackEscaped}\`}).firstChild)};this.src='${tier2}';">
      </div></div>`;
    }
    return `<div class="glyph-wrap"><div class="icon-glyph" style="border-color:${item.color}55">${fallback}</div></div>`;
  }

  /* ============ GRID PLACEMENT ============ */
  function childrenOf(parentId){
    return state.icons.filter(i => i.parentId === parentId);
  }

  function occupied(parentId, x, y, excludeId){
    return childrenOf(parentId).some(i => i.id !== excludeId && i.x === x && i.y === y);
  }

  function nextFreeSlot(parentId){
    for(let y=0; y<200; y++){
      for(let x=0; x<200; x++){
        if(!occupied(parentId, x, y, null)) return {x,y};
      }
    }
    return {x:0,y:0};
  }

  function nearestFreeSlot(parentId, targetX, targetY, excludeId){
    if(!occupied(parentId, targetX, targetY, excludeId)) return {x: Math.max(0,targetX), y: Math.max(0,targetY)};
    let best = null, bestDist = Infinity;
    for(let y=0; y<40; y++){
      for(let x=0; x<40; x++){
        if(occupied(parentId, x, y, excludeId)) continue;
        const d = Math.hypot(x-targetX, y-targetY);
        if(d < bestDist){ bestDist = d; best = {x,y}; }
      }
    }
    return best || {x:0,y:0};
  }

  /* ============ ACCESSIBILITY: labels + roving tabindex ============ */
  function ariaLabelFor(item){
    if(item.type === "folder") return `Folder: ${item.label}`;
    if(item.type === "app") return `App: ${item.label}`;
    return `Bookmark: ${item.label}`;
  }

  // Roving tabindex: exactly one icon per container is a Tab stop at a time
  // (the last one that had keyboard/pointer focus); all others are tabindex=-1
  // so Tab moves in and out of the grid in one step instead of one-per-icon.
  let focusedIconId = null;
  function getRovingId(items){
    if(items.length === 0) return null;
    if(focusedIconId && items.some(i=>i.id===focusedIconId)) return focusedIconId;
    return items[0].id;
  }

  function nearestInDirection(items, current, dir){
    const candidates = items.filter(i=>i.id!==current.id);
    let pool;
    if(dir==="right") pool = candidates.filter(i=>i.y===current.y && i.x>current.x).sort((a,b)=>a.x-b.x);
    else if(dir==="left") pool = candidates.filter(i=>i.y===current.y && i.x<current.x).sort((a,b)=>b.x-a.x);
    else if(dir==="down") pool = candidates.filter(i=>i.x===current.x && i.y>current.y).sort((a,b)=>a.y-b.y);
    else if(dir==="up") pool = candidates.filter(i=>i.x===current.x && i.y<current.y).sort((a,b)=>b.y-a.y);
    if(pool && pool.length) return pool[0].id;

    // No exact same row/column — fall back to nearest icon generally in that direction.
    let general = candidates.filter(i=>{
      if(dir==="right") return i.x>current.x;
      if(dir==="left") return i.x<current.x;
      if(dir==="down") return i.y>current.y;
      if(dir==="up") return i.y<current.y;
      return false;
    });
    if(general.length===0) return null;
    general.sort((a,b)=>
      (Math.abs(a.x-current.x)+Math.abs(a.y-current.y)) - (Math.abs(b.x-current.x)+Math.abs(b.y-current.y))
    );
    return general[0].id;
  }

  function handleIconGridKeydown(e, parentId){
    const el = e.target.closest(".icon");
    if(!el) return;
    const items = childrenOf(parentId);
    const current = items.find(i=>i.id===el.dataset.id);
    if(!current) return;

    const dirMap = { ArrowRight:"right", ArrowLeft:"left", ArrowDown:"down", ArrowUp:"up" };
    if(dirMap[e.key]){
      e.preventDefault();
      const nextId = nearestInDirection(items, current, dirMap[e.key]);
      if(!nextId) return;
      const container = parentId===null ? gridLayer : folderBody;
      const nextEl = container.querySelector(`.icon[data-id="${nextId}"]`);
      if(nextEl){
        el.tabIndex = -1;
        nextEl.tabIndex = 0;
        focusedIconId = nextId;
        nextEl.focus();
      }
    }else if(e.key === "Enter" || e.key === " "){
      e.preventDefault();
      const item = state.icons.find(i=>i.id===current.id);
      if(item) openItem(item);
    }
  }

  /* ============ RENDER ============ */
  function renderInto(container, parentId, opts){
    opts = opts || {};
    // clear icons but keep rubberband if root
    Array.from(container.querySelectorAll(".icon")).forEach(n=>n.remove());
    const items = childrenOf(parentId).sort((a,b)=> a.y-b.y || a.x-b.x);
    const cell = getCellSize();
    const offset = getGridOffset(parentId);
    const rovingId = getRovingId(items);

    items.forEach(item=>{
      const el = document.createElement("div");
      el.className = "icon" + (selected.has(item.id) ? " selected" : "");
      el.dataset.id = item.id;
      el.setAttribute("role", "button");
      el.setAttribute("aria-label", ariaLabelFor(item));
      el.tabIndex = (item.id === rovingId) ? 0 : -1;
      el.style.left = (item.x*cell.w + offset.left) + "px";
      el.style.top = (item.y*cell.h + offset.top) + "px";
      el.innerHTML = `${glyphFor(item)}<div class="icon-label" data-id="${item.id}">${escapeHtml(item.label)}</div>`;
      container.appendChild(el);
      wireIconEvents(el, item, parentId);
    });

    if(parentId === null){
      const maxY = items.reduce((m,i)=> Math.max(m,i.y), -1);
      const neededHeight = offset.top + (maxY+1)*cell.h + 100;
      gridLayer.style.minHeight = Math.max(neededHeight, window.innerHeight) + "px";
      emptyHint.style.display = items.length === 0 ? "block" : "none";
      statusEl.textContent = `${state.icons.filter(i=>i.parentId===null).length} item${state.icons.filter(i=>i.parentId===null).length===1?"":"s"} on desktop`;
      if(typeof applyAppSearch === "function" && searchMode === "app" && searchInput && searchInput.value){
        applyAppSearch(searchInput.value);
      }
    }else{
      const maxYf = items.reduce((m,i)=> Math.max(m,i.y), -1);
      const neededHf = offset.top + (maxYf+1)*cell.h + 40;
      folderBody.style.minHeight = neededHf + "px";
      const hint = folderBody.querySelector(".empty-hint");
      if(items.length === 0){
        if(!hint){
          const h = document.createElement("div");
          h.className = "empty-hint";
          h.textContent = "This folder is empty. Right-click to add something.";
          container.appendChild(h);
        }
      }else if(hint){ hint.remove(); }
    }
  }

  function render(){
    renderInto(gridLayer, null);
    if(currentFolderId !== null){
      renderInto(folderBody, currentFolderId);
    }
  }

  function escapeHtml(s){
    const d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }

  /* ============ SELECTION ============ */
  function clearSelection(){ selected.clear(); render(); }

  function selectOnly(id){ selected = new Set([id]); render(); }

  /* ============ ICON EVENTS (drag, click, dblclick, rename) ============ */
  let dragState = null;

  function wireIconEvents(el, item, parentId){
    let downX, downY, moved=false, startLeft, startTop;

    el.addEventListener("focus", ()=>{ focusedIconId = item.id; });

    el.addEventListener("pointerdown", (e)=>{
      if(e.pointerType === "mouse" && e.button !== 0) return;
      if(e.target.isContentEditable) return;
      e.stopPropagation();
      const pointerType = e.pointerType || "mouse";
      const pointerId = e.pointerId;
      downX = e.clientX; downY = e.clientY; moved = false;
      startLeft = parseFloat(el.style.left);
      startTop = parseFloat(el.style.top);
      try{ el.setPointerCapture(pointerId); }catch(err){}
      el.focus({ preventScroll: true });

      if(!e.shiftKey && !selected.has(item.id)){
        selectOnly(item.id);
        el.classList.add("selected");
      } else if(e.shiftKey){
        if(selected.has(item.id)) selected.delete(item.id); else selected.add(item.id);
        render();
      }

      dragState = { item, el, parentId, offsetX: downX-startLeft, offsetY: downY-startTop };

      function onMove(ev){
        if(ev.pointerId !== pointerId) return;
        const dx = ev.clientX - downX, dy = ev.clientY - downY;
        if(Math.abs(dx) > 4 || Math.abs(dy) > 4) moved = true;
        if(!moved) return;
        ev.preventDefault();
        el.classList.add("dragging");
        el.style.left = (startLeft + dx) + "px";
        el.style.top = (startTop + dy) + "px";
      }
      function onUp(ev){
        if(ev.pointerId !== pointerId) return;
        try{ el.releasePointerCapture(pointerId); }catch(err){}
        document.removeEventListener("pointermove", onMove);
        document.removeEventListener("pointerup", onUp);
        el.classList.remove("dragging");
        if(moved){
          const left = parseFloat(el.style.left), top = parseFloat(el.style.top);
          const cell = getCellSize();
          const offset = getGridOffset(parentId);
          const gx = Math.round((left - offset.left) / cell.w);
          const gy = Math.round((top - offset.top) / cell.h);
          const slot = nearestFreeSlot(parentId, Math.max(0,gx), Math.max(0,gy), item.id);
          item.x = slot.x; item.y = slot.y;
          save();
          render();
        } else if(pointerType === "touch" || pointerType === "pen"){
          // Touch/stylus: a tap that didn't drag opens the item directly.
          openItem(item);
        }
        setTimeout(()=>{ moved = false; }, 0);
      }
      document.addEventListener("pointermove", onMove, {passive:false});
      document.addEventListener("pointerup", onUp);
    });

    // Desktop/mouse: double-click opens. Touch opens on single tap (handled above).
    el.addEventListener("dblclick", (e)=>{
      if(e.target.classList.contains("icon-label")) return;
      openItem(item);
    });

    const label = el.querySelector(".icon-label");
    label.addEventListener("dblclick", (e)=>{
      e.stopPropagation();
      startRename(label, item);
    });

    el.addEventListener("contextmenu", (e)=>{
      e.preventDefault(); e.stopPropagation();
      if(!selected.has(item.id)) selectOnly(item.id);
      showIconContextMenu(e.clientX, e.clientY, item, parentId);
    });
  }

  function startRename(label, item){
    label.contentEditable = "true";
    label.classList.add("editing");
    const range = document.createRange();
    range.selectNodeContents(label);
    const sel = window.getSelection();
    sel.removeAllRanges(); sel.addRange(range);
    label.focus();

    function commit(){
      label.contentEditable = "false";
      const text = label.textContent.trim() || "Untitled";
      item.label = text;
      save();
      render();
    }
    label.addEventListener("blur", commit, {once:true});
    label.addEventListener("keydown", function ke(e){
      if(e.key === "Enter"){ e.preventDefault(); label.blur(); }
      if(e.key === "Escape"){ label.textContent = item.label; label.blur(); }
    });
  }

  function openItem(item){
    if(item.type === "folder"){
      currentFolderId = item.id;
      folderTitle.innerHTML = `${folderSVG(item.color)} ${escapeHtml(item.label)}`;
      folderOverlay.classList.add("open");
      render();
    }else if(item.type === "app"){
      openWindow(item.appId, item.label, item.color);
    }else{
      window.open(item.url, "_blank", "noopener");
    }
  }

  document.getElementById("folderClose").addEventListener("click", ()=>{
    folderOverlay.classList.remove("open");
    currentFolderId = null;
  });
  folderOverlay.addEventListener("mousedown", (e)=>{
    if(e.target === folderOverlay){ folderOverlay.classList.remove("open"); currentFolderId = null; }
  });

  /* ============ DELETE ============ */
  function deleteSelected(){
    if(selected.size === 0) return;
    const toDelete = new Set(selected);
    // also delete descendants of any selected folder
    let changed = true;
    while(changed){
      changed = false;
      state.icons.forEach(i=>{
        if(toDelete.has(i.parentId) && !toDelete.has(i.id)){ toDelete.add(i.id); changed = true; }
      });
    }
    state.icons = state.icons.filter(i => !toDelete.has(i.id));
    selected.clear();
    save();
    render();
  }

  document.addEventListener("keydown", (e)=>{
    if(document.activeElement && document.activeElement.isContentEditable) return;
    if((e.key === "Delete" || e.key === "Backspace") && selected.size > 0){
      e.preventDefault();
      deleteSelected();
    }
    if(e.key === "Escape"){
      closeCtxMenu();
      if(itemOverlay.classList.contains("open")) closeItemModal();
      if(appPickerOverlay.classList.contains("open")) closeAppPicker();
      document.getElementById("settingsPop").classList.remove("open");
      if(folderOverlay.classList.contains("open")){ folderOverlay.classList.remove("open"); currentFolderId=null; }
      clearSelection();
    }
  });

  // Generic keyboard-activation bridge: any role="button" element (settings
  // gear, search-go, FAB, folder close, etc.) responds to Enter/Space the
  // same way a native button element would. Icons and context-menu items manage
  // their own Enter/Space handling already, so they're excluded here to
  // avoid double-firing.
  document.addEventListener("keydown", (e)=>{
    if(e.key !== "Enter" && e.key !== " ") return;
    const t = e.target;
    if(!t || t.getAttribute("role") !== "button") return;
    if(t.classList.contains("icon") || t.classList.contains("ctx-item")) return;
    e.preventDefault();
    t.click();
  });

  /* ============ RUBBER BAND SELECT (desktop root, mouse only) ============ */
  let rbStart = null;
  desktop.addEventListener("pointerdown", (e)=>{
    if(e.pointerType !== "mouse") return; // touch scrolls/taps naturally instead
    if(e.button !== 0) return;
    if(e.target.closest(".icon")) return;
    closeCtxMenu();
    document.getElementById("settingsPop").classList.remove("open");
    const pointerId = e.pointerId;
    const rect = desktop.getBoundingClientRect();
    rbStart = { x: e.clientX - rect.left + desktop.scrollLeft, y: e.clientY - rect.top + desktop.scrollTop };
    rubberband.style.display = "block";
    rubberband.style.left = rbStart.x + "px";
    rubberband.style.top = rbStart.y + "px";
    rubberband.style.width = "0px";
    rubberband.style.height = "0px";
    if(!e.shiftKey) selected.clear();

    function onMove(ev){
      if(ev.pointerId !== pointerId) return;
      const r = desktop.getBoundingClientRect();
      const cx = ev.clientX - r.left + desktop.scrollLeft;
      const cy = ev.clientY - r.top + desktop.scrollTop;
      const x = Math.min(cx, rbStart.x), y = Math.min(cy, rbStart.y);
      const w = Math.abs(cx - rbStart.x), h = Math.abs(cy - rbStart.y);
      rubberband.style.left = x+"px"; rubberband.style.top = y+"px";
      rubberband.style.width = w+"px"; rubberband.style.height = h+"px";

      // hit test using each icon's real rendered size
      const bandRect = { left:x, top:y, right:x+w, bottom:y+h };
      gridLayer.querySelectorAll(".icon").forEach(el=>{
        const l = parseFloat(el.style.left), t = parseFloat(el.style.top);
        const r2 = { left:l, top:t, right:l+el.offsetWidth, bottom:t+el.offsetHeight };
        const hit = !(r2.right < bandRect.left || r2.left > bandRect.right || r2.bottom < bandRect.top || r2.top > bandRect.bottom);
        const id = el.dataset.id;
        if(hit) selected.add(id);
        el.classList.toggle("selected", selected.has(id));
      });
    }
    function onUp(ev){
      if(ev.pointerId !== pointerId) return;
      document.removeEventListener("pointermove", onMove);
      document.removeEventListener("pointerup", onUp);
      rubberband.style.display = "none";
      rbStart = null;
    }
    document.addEventListener("pointermove", onMove);
    document.addEventListener("pointerup", onUp);
  });

  desktop.addEventListener("click", (e)=>{
    if(!e.target.closest(".icon") && !rbStart){ clearSelection(); focusedWindowId = null; }
  });

  folderBody.addEventListener("pointerdown", (e)=>{
    if(e.target.closest(".icon")) return;
    if(!e.shiftKey){ selected.clear(); render(); }
  });

  /* ============ CONTEXT MENUS ============ */
  function closeCtxMenu(){
    if(activeCtxMenu){ activeCtxMenu.remove(); activeCtxMenu = null; }
  }
  document.addEventListener("click", (e)=>{
    if(activeCtxMenu && !activeCtxMenu.contains(e.target)) closeCtxMenu();
  });

  function buildMenu(items, x, y){
    closeCtxMenu();
    const menu = document.createElement("div");
    menu.className = "ctx-menu";
    menu.setAttribute("role", "menu");
    items.forEach(it=>{
      if(it === "sep"){
        const s = document.createElement("div");
        s.className = "ctx-sep";
        s.setAttribute("role", "separator");
        menu.appendChild(s);
        return;
      }
      const row = document.createElement("div");
      row.className = "ctx-item" + (it.danger ? " danger" : "");
      row.setAttribute("role", "menuitem");
      row.tabIndex = -1;
      row.innerHTML = `<span>${it.label}</span>${it.hint ? `<span class="ctx-hint">${it.hint}</span>` : ""}`;
      row.addEventListener("click", ()=>{ closeCtxMenu(); it.action(); });
      menu.appendChild(row);
    });
    menu.addEventListener("keydown", (e)=>{
      const rows = Array.from(menu.querySelectorAll('[role="menuitem"]'));
      const i = rows.indexOf(document.activeElement);
      if(e.key === "ArrowDown"){ e.preventDefault(); (rows[i+1] || rows[0]).focus(); }
      else if(e.key === "ArrowUp"){ e.preventDefault(); (rows[i-1] || rows[rows.length-1]).focus(); }
      else if(e.key === "Home"){ e.preventDefault(); rows[0].focus(); }
      else if(e.key === "End"){ e.preventDefault(); rows[rows.length-1].focus(); }
      else if(e.key === "Enter" || e.key === " "){ e.preventDefault(); document.activeElement.click(); }
    });
    document.body.appendChild(menu);
    const vw = window.innerWidth, vh = window.innerHeight;
    const mw = 200, mh = items.length * 34 + 20;
    menu.style.left = Math.min(x, vw-mw-8) + "px";
    menu.style.top = Math.min(y, vh-mh-8) + "px";
    activeCtxMenu = menu;
    const firstRow = menu.querySelector('[role="menuitem"]');
    if(firstRow) firstRow.focus();
  }

  gridLayer.addEventListener("contextmenu", (e)=>{
    if(e.target.closest(".icon")) return;
    e.preventDefault();
    showCanvasContextMenu(e.clientX, e.clientY, null);
  });
  folderBody.addEventListener("contextmenu", (e)=>{
    if(e.target.closest(".icon")) return;
    e.preventDefault();
    showCanvasContextMenu(e.clientX, e.clientY, currentFolderId);
  });
  gridLayer.addEventListener("keydown", (e)=> handleIconGridKeydown(e, null));
  folderBody.addEventListener("keydown", (e)=> handleIconGridKeydown(e, currentFolderId));

  function showCanvasContextMenu(x, y, parentId){
    buildMenu([
      { label:"New bookmark", action: ()=> openItemModal({mode:"create", type:"bookmark", parentId}) },
      { label:"New folder", action: ()=> openItemModal({mode:"create", type:"folder", parentId}) },
      { label:"New app", action: ()=> openAppPicker(parentId) },
      "sep",
      { label:"Sort by name", action: ()=> sortChildren(parentId, "name") },
      { label:"Arrange to grid", action: ()=> arrangeGrid(parentId) },
    ], x, y);
  }

  function showIconContextMenu(x, y, item, parentId){
    const opts = [
      { label: item.type==="folder" ? "Open folder" : "Open link", action: ()=> openItem(item) },
      { label:"Rename", hint:"dbl-click", action: ()=>{
          const el = (parentId===null?gridLayer:folderBody).querySelector(`.icon-label[data-id="${item.id}"]`);
          if(el) startRename(el, item);
        } },
    ];
    if(item.type === "bookmark"){
      opts.push({ label:"Edit URL", action: ()=> openItemModal({mode:"edit", item}) });
    }
    opts.push("sep");
    opts.push({ label: selected.size>1 ? `Delete ${selected.size} items` : "Delete", danger:true, hint:"Del", action: deleteSelected });
    buildMenu(opts, x, y);
  }

  function sortChildren(parentId, mode){
    const items = childrenOf(parentId).sort((a,b)=> a.label.localeCompare(b.label));
    const cell = getCellSize();
    let x=0, y=0, cols = Math.max(1, Math.floor((window.innerWidth-48)/cell.w));
    items.forEach((it)=>{
      it.x = x; it.y = y;
      x++; if(x>=cols){ x=0; y++; }
    });
    save(); render();
  }
  function arrangeGrid(parentId){ sortChildren(parentId); }

  /* ============ ADD / EDIT MODAL ============ */
  const itemOverlay = document.getElementById("itemOverlay");
  const itemLabel = document.getElementById("itemLabel");
  const itemUrl = document.getElementById("itemUrl");
  const urlField = document.getElementById("urlField");
  const colorPicks = document.getElementById("colorPicks");
  let modalCtx = null;
  let modalColor = COLORS[0];

  COLORS.forEach(c=>{
    const dot = document.createElement("div");
    dot.className = "colorpick";
    dot.style.background = c;
    dot.dataset.color = c;
    dot.addEventListener("click", ()=>{
      modalColor = c;
      colorPicks.querySelectorAll(".colorpick").forEach(d=>d.classList.toggle("active", d.dataset.color===c));
    });
    colorPicks.appendChild(dot);
  });

  function openItemModal(ctx){
    modalCtx = ctx;
    const title = document.getElementById("itemModalTitle");
    if(ctx.mode === "create"){
      title.textContent = ctx.type === "folder" ? "New folder" : "New bookmark";
      itemLabel.value = "";
      itemUrl.value = "";
      modalColor = COLORS[Math.floor(Math.random()*COLORS.length)];
      urlField.style.display = ctx.type === "folder" ? "none" : "block";
    }else{
      title.textContent = "Edit bookmark";
      itemLabel.value = ctx.item.label;
      itemUrl.value = ctx.item.url || "";
      modalColor = ctx.item.color;
      urlField.style.display = "block";
    }
    colorPicks.querySelectorAll(".colorpick").forEach(d=>d.classList.toggle("active", d.dataset.color===modalColor));
    itemOverlay.classList.add("open");
    setTimeout(()=> itemLabel.focus(), 30);
  }
  function closeItemModal(){ itemOverlay.classList.remove("open"); modalCtx = null; }

  document.getElementById("itemCancel").addEventListener("click", closeItemModal);
  itemOverlay.addEventListener("mousedown", (e)=>{ if(e.target === itemOverlay) closeItemModal(); });

  document.getElementById("itemSave").addEventListener("click", ()=>{
    if(!modalCtx) return;
    const label = itemLabel.value.trim();
    if(!label){ itemLabel.focus(); return; }
    let url = itemUrl.value.trim();

    if(modalCtx.mode === "create"){
      if(modalCtx.type === "bookmark"){
        if(!url){ itemUrl.focus(); return; }
        if(!/^https?:\/\//i.test(url)) url = "https://" + url;
      }
      const slot = nextFreeSlot(modalCtx.parentId);
      state.icons.push({
        id: uid(), type: modalCtx.type, label,
        url: modalCtx.type==="bookmark" ? url : undefined,
        color: modalColor, x: slot.x, y: slot.y, parentId: modalCtx.parentId
      });
    }else{
      modalCtx.item.label = label;
      if(modalCtx.item.type === "bookmark"){
        if(!/^https?:\/\//i.test(url)) url = "https://" + url;
        modalCtx.item.url = url;
      }
      modalCtx.item.color = modalColor;
    }
    save();
    closeItemModal();
    render();
  });

  /* ============ FAB ============ */
  document.getElementById("fab").addEventListener("click", ()=>{
    openItemModal({ mode:"create", type:"bookmark", parentId: currentFolderId });
  });

  /* ============ WINDOW MANAGER ============ */
  let windows = [];        // { id, appId, title, color, x,y,w,h, z, minimized, maximized, prevBounds }
  let topZ = 100;
  let focusedWindowId = null;
  const windowKeyHandlers = {}; // winId -> function(e)

  function maxBounds(){
    const cs = getComputedStyle(document.documentElement);
    const topbarH = parseFloat(cs.getPropertyValue("--topbar-h")) || 44;
    const searchH = parseFloat(cs.getPropertyValue("--searchbar-h")) || 58;
    const safeTop = parseFloat(cs.getPropertyValue("--safe-top")) || 0;
    const safeLeft = parseFloat(cs.getPropertyValue("--safe-left")) || 0;
    const safeRight = parseFloat(cs.getPropertyValue("--safe-right")) || 0;
    const safeBottom = parseFloat(cs.getPropertyValue("--safe-bottom")) || 0;
    const top = topbarH + safeTop + searchH + 10;
    const taskbarH = document.body.classList.contains("has-taskbar") ? 62 + safeBottom : 0;
    return {
      x: 8 + safeLeft,
      y: top,
      w: window.innerWidth - 16 - safeLeft - safeRight,
      h: window.innerHeight - top - taskbarH - 8 - safeBottom
    };
  }

  function openWindow(appId, title, color){
    const app = APP_REGISTRY[appId];
    if(!app) return;
    let win = windows.find(w=>w.id===appId);
    if(win){
      win.minimized = false;
      focusWindow(win.id);
      renderWindows();
      return;
    }
    const vw = window.innerWidth, vh = window.innerHeight;
    const w = Math.min(app.defaultWidth, vw-32);
    const h = Math.min(app.defaultHeight, vh-160);
    const stack = windows.length % 6;
    win = {
      id: appId, appId, title, color,
      x: Math.round((vw-w)/2 + stack*20),
      y: Math.round((vh-h)/2 - 30 + stack*18),
      w, h,
      z: ++topZ,
      minimized: false,
      maximized: false,
      prevBounds: null
    };
    windows.push(win);
    focusedWindowId = win.id;
    renderWindows();
  }

  function focusWindow(id){
    const win = windows.find(w=>w.id===id);
    if(!win) return;
    win.z = ++topZ;
    focusedWindowId = id;
    renderWindows();
  }

  function closeWindow(id){
    windows = windows.filter(w=>w.id!==id);
    delete windowKeyHandlers[id];
    const el = document.getElementById("win-"+id);
    if(el) el.remove();
    if(focusedWindowId === id){
      const top = windows.slice().sort((a,b)=>b.z-a.z)[0];
      focusedWindowId = top ? top.id : null;
    }
    updateTaskbar();
  }

  function minimizeWindow(id){
    const win = windows.find(w=>w.id===id);
    if(!win) return;
    win.minimized = true;
    if(focusedWindowId === id){
      const top = windows.filter(w=>!w.minimized && w.id!==id).sort((a,b)=>b.z-a.z)[0];
      focusedWindowId = top ? top.id : null;
    }
    renderWindows();
  }

  function toggleMaximize(id){
    const win = windows.find(w=>w.id===id);
    if(!win) return;
    if(win.maximized){
      Object.assign(win, win.prevBounds);
      win.maximized = false;
    }else{
      win.prevBounds = { x: win.x, y: win.y, w: win.w, h: win.h };
      const b = maxBounds();
      win.x = b.x; win.y = b.y; win.w = b.w; win.h = b.h;
      win.maximized = true;
    }
    focusWindow(id);
  }

  function buildWindowEl(win){
    const app = APP_REGISTRY[win.appId];
    const el = document.createElement("div");
    el.className = "oswindow";
    el.id = "win-"+win.id;
    el.innerHTML = `
      <div class="oswindow-titlebar">
        <div class="oswindow-title">
          <span class="oswindow-icon" style="color:${win.color}">${app.icon(win.color)}</span>
          <span>${escapeHtml(win.title)}</span>
        </div>
        <div class="oswindow-controls">
          <div class="win-btn win-min" title="Minimize">&#8211;</div>
          <div class="win-btn win-max" title="Maximize">&#9633;</div>
          <div class="win-btn win-close" title="Close">&#10005;</div>
        </div>
      </div>
      <div class="oswindow-body"></div>
      <div class="oswindow-resize"></div>
    `;
    el.addEventListener("pointerdown", ()=>{ if(focusedWindowId!==win.id) focusWindow(win.id); });

    const titlebar = el.querySelector(".oswindow-titlebar");
    wireWindowDrag(titlebar, win, el);
    titlebar.addEventListener("dblclick", (e)=>{ if(!e.target.closest(".win-btn")) toggleMaximize(win.id); });

    wireWindowResize(el.querySelector(".oswindow-resize"), win, el);

    el.querySelector(".win-min").addEventListener("click", (e)=>{ e.stopPropagation(); minimizeWindow(win.id); });
    el.querySelector(".win-max").addEventListener("click", (e)=>{ e.stopPropagation(); toggleMaximize(win.id); });
    el.querySelector(".win-close").addEventListener("click", (e)=>{ e.stopPropagation(); closeWindow(win.id); });

    app.render(el.querySelector(".oswindow-body"), win.id);
    return el;
  }

  function wireWindowDrag(handle, win, el){
    handle.addEventListener("pointerdown", (e)=>{
      if(e.target.closest(".win-btn")) return;
      if(e.pointerType==="mouse" && e.button!==0) return;
      focusWindow(win.id);
      const startX = e.clientX, startY = e.clientY;
      const originX = win.x, originY = win.y;
      const pointerId = e.pointerId;
      try{ handle.setPointerCapture(pointerId); }catch(err){}
      function onMove(ev){
        if(ev.pointerId!==pointerId) return;
        win.x = originX + (ev.clientX-startX);
        win.y = Math.max(4, originY + (ev.clientY-startY));
        el.style.left = win.x+"px"; el.style.top = win.y+"px";
      }
      function onUp(ev){
        if(ev.pointerId!==pointerId) return;
        document.removeEventListener("pointermove", onMove);
        document.removeEventListener("pointerup", onUp);
        try{ handle.releasePointerCapture(pointerId); }catch(err){}
      }
      document.addEventListener("pointermove", onMove);
      document.addEventListener("pointerup", onUp);
    });
  }

  function wireWindowResize(handle, win, el){
    handle.addEventListener("pointerdown", (e)=>{
      e.stopPropagation();
      focusWindow(win.id);
      const app = APP_REGISTRY[win.appId];
      const startX = e.clientX, startY = e.clientY;
      const originW = win.w, originH = win.h;
      const pointerId = e.pointerId;
      try{ handle.setPointerCapture(pointerId); }catch(err){}
      function onMove(ev){
        if(ev.pointerId!==pointerId) return;
        win.w = Math.max(app.minWidth, originW + (ev.clientX-startX));
        win.h = Math.max(app.minHeight, originH + (ev.clientY-startY));
        el.style.width = win.w+"px"; el.style.height = win.h+"px";
      }
      function onUp(ev){
        if(ev.pointerId!==pointerId) return;
        document.removeEventListener("pointermove", onMove);
        document.removeEventListener("pointerup", onUp);
        try{ handle.releasePointerCapture(pointerId); }catch(err){}
      }
      document.addEventListener("pointermove", onMove);
      document.addEventListener("pointerup", onUp);
    });
  }

  function renderWindows(){
    windows.forEach(win=>{
      let el = document.getElementById("win-"+win.id);
      if(!el){
        el = buildWindowEl(win);
        windowLayer.appendChild(el);
      }
      el.style.display = win.minimized ? "none" : "flex";
      el.style.left = win.x+"px";
      el.style.top = win.y+"px";
      el.style.width = win.w+"px";
      el.style.height = win.h+"px";
      el.style.zIndex = win.z;
    });
    updateTaskbar();
  }

  function updateTaskbar(){
    taskbar.innerHTML = "";
    if(windows.length === 0){
      document.body.classList.remove("has-taskbar");
      return;
    }
    document.body.classList.add("has-taskbar");
    const maxZ = Math.max.apply(null, windows.map(w=>w.z));
    windows.slice().sort((a,b)=>a.z-b.z).forEach(win=>{
      const app = APP_REGISTRY[win.appId];
      const pill = document.createElement("div");
      pill.className = "taskbar-pill" + (!win.minimized ? " active" : "");
      pill.innerHTML = `<span class="tb-icon" style="color:${win.color}">${app.icon(win.color)}</span><span class="tb-label">${escapeHtml(win.title)}</span><span class="tb-close" title="Close">&#10005;</span>`;
      pill.addEventListener("click", (e)=>{
        if(e.target.classList.contains("tb-close")){ closeWindow(win.id); return; }
        if(win.minimized){ win.minimized = false; focusWindow(win.id); }
        else if(win.z === maxZ){ minimizeWindow(win.id); }
        else{ focusWindow(win.id); }
      });
      taskbar.appendChild(pill);
    });
  }

  // Route keyboard input to whichever window is currently focused, but never
  // hijack typing into a text field (search box, rename label, modal inputs).
  document.addEventListener("keydown", (e)=>{
    if(!focusedWindowId) return;
    const ae = document.activeElement;
    if(ae && (ae.tagName==="INPUT" || ae.tagName==="TEXTAREA" || ae.isContentEditable)) return;
    const handler = windowKeyHandlers[focusedWindowId];
    if(handler) handler(e);
  });

  /* ============ APP PICKER ============ */
  let appPickerParentId = null;
  const appPickerOverlay = document.getElementById("appPickerOverlay");
  function openAppPicker(parentId){
    appPickerParentId = parentId;
    const list = document.getElementById("appPickerList");
    list.innerHTML = "";
    const ids = Object.keys(APP_REGISTRY);
    ids.forEach((appId, i)=>{
      const app = APP_REGISTRY[appId];
      const color = COLORS[i % COLORS.length];
      const row = document.createElement("div");
      row.className = "app-pick-row";
      row.innerHTML = `<div class="app-pick-icon" style="background:${color}1a;border-color:${color}55">${app.icon(color)}</div><span>${app.name}</span>`;
      row.addEventListener("click", ()=>{
        const slot = nextFreeSlot(appPickerParentId);
        state.icons.push({ id: uid(), type:"app", appId, label: app.name, color, x: slot.x, y: slot.y, parentId: appPickerParentId });
        save();
        render();
        closeAppPicker();
      });
      list.appendChild(row);
    });
    appPickerOverlay.classList.add("open");
  }
  function closeAppPicker(){ appPickerOverlay.classList.remove("open"); }
  document.getElementById("appPickerCancel").addEventListener("click", closeAppPicker);
  appPickerOverlay.addEventListener("mousedown", (e)=>{ if(e.target===appPickerOverlay) closeAppPicker(); });

  /* ============ APP: CALCULATOR ============ */
  function renderCalculatorApp(body, winId){
    body.innerHTML = `
      <div class="calc">
        <div class="calc-display"><span class="calc-display-value">0</span></div>
        <div class="calc-grid">
          <button data-act="clear" class="calc-btn calc-fn">C</button>
          <button data-act="sign" class="calc-btn calc-fn">±</button>
          <button data-act="percent" class="calc-btn calc-fn">%</button>
          <button data-act="op" data-op="/" class="calc-btn calc-op">÷</button>
          <button data-act="digit" data-val="7" class="calc-btn">7</button>
          <button data-act="digit" data-val="8" class="calc-btn">8</button>
          <button data-act="digit" data-val="9" class="calc-btn">9</button>
          <button data-act="op" data-op="*" class="calc-btn calc-op">×</button>
          <button data-act="digit" data-val="4" class="calc-btn">4</button>
          <button data-act="digit" data-val="5" class="calc-btn">5</button>
          <button data-act="digit" data-val="6" class="calc-btn">6</button>
          <button data-act="op" data-op="-" class="calc-btn calc-op">−</button>
          <button data-act="digit" data-val="1" class="calc-btn">1</button>
          <button data-act="digit" data-val="2" class="calc-btn">2</button>
          <button data-act="digit" data-val="3" class="calc-btn">3</button>
          <button data-act="op" data-op="+" class="calc-btn calc-op">+</button>
          <button data-act="digit" data-val="0" class="calc-btn calc-zero">0</button>
          <button data-act="decimal" class="calc-btn">.</button>
          <button data-act="equals" class="calc-btn calc-equals">=</button>
        </div>
      </div>
    `;

    const displayEl = body.querySelector(".calc-display-value");
    let current = "0", stored = null, pendingOp = null, freshEntry = true;

    function updateDisplay(){
      displayEl.textContent = current;
      displayEl.style.fontSize = current.length > 9 ? "22px" : "34px";
    }
    function inputDigit(d){
      if(freshEntry){ current = d==="." ? "0." : d; freshEntry = false; }
      else if(current.length < 14){ current = (current==="0" && d!==".") ? d : current+d; }
      updateDisplay();
    }
    function inputDecimal(){
      if(freshEntry){ current="0."; freshEntry=false; }
      else if(!current.includes(".")){ current += "."; }
      updateDisplay();
    }
    function compute(a,b,op){
      if(op==="+") return a+b;
      if(op==="-") return a-b;
      if(op==="*") return a*b;
      if(op==="/") return b===0 ? NaN : a/b;
      return b;
    }
    function formatResult(n){
      if(!isFinite(n)) return "Error";
      let s = String(Math.round(n*1e10)/1e10);
      if(s.replace("-","").length > 14) s = n.toExponential(6);
      return s;
    }
    function setOperator(op){
      if(pendingOp!==null && !freshEntry){
        stored = compute(stored, parseFloat(current), pendingOp);
        current = formatResult(stored);
      }else{
        stored = parseFloat(current);
      }
      pendingOp = op;
      freshEntry = true;
      updateDisplay();
    }
    function equals(){
      if(pendingOp===null) return;
      const result = compute(stored, parseFloat(current), pendingOp);
      current = formatResult(result);
      stored = null; pendingOp = null; freshEntry = true;
      updateDisplay();
    }
    function clearAll(){
      current = "0"; stored = null; pendingOp = null; freshEntry = true;
      updateDisplay();
    }
    function toggleSign(){
      if(current!=="0") current = current.startsWith("-") ? current.slice(1) : "-"+current;
      updateDisplay();
    }
    function percent(){
      current = formatResult(parseFloat(current)/100);
      freshEntry = true;
      updateDisplay();
    }

    body.querySelectorAll(".calc-btn").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        const act = btn.dataset.act;
        if(act==="digit") inputDigit(btn.dataset.val);
        else if(act==="decimal") inputDecimal();
        else if(act==="op") setOperator(btn.dataset.op);
        else if(act==="equals") equals();
        else if(act==="clear") clearAll();
        else if(act==="sign") toggleSign();
        else if(act==="percent") percent();
      });
    });

    windowKeyHandlers[winId] = function(e){
      if(/^[0-9]$/.test(e.key)){ inputDigit(e.key); e.preventDefault(); }
      else if(e.key==="."){ inputDecimal(); e.preventDefault(); }
      else if(["+","-","*","/"].includes(e.key)){ setOperator(e.key); e.preventDefault(); }
      else if(e.key==="Enter" || e.key==="="){ equals(); e.preventDefault(); }
      else if(e.key==="Escape"){ clearAll(); e.preventDefault(); }
      else if(e.key==="Backspace"){ current = current.length>1 ? current.slice(0,-1) : "0"; updateDisplay(); e.preventDefault(); }
    };
  }

  /* ============ APP: TODO ============ */
  function renderTodoApp(body, winId){
    const STORE_KEY = "on369.todos.v1";
    let todos = [];
    try{
      const raw = localStorage.getItem(STORE_KEY);
      todos = raw ? JSON.parse(raw) : [];
    }catch(e){ todos = []; }
    let filter = "all";

    body.innerHTML = `
      <div class="todo-app">
        <div class="todo-input-row">
          <input type="text" class="todo-input" placeholder="Add a task…" autocomplete="off">
          <div class="todo-add-btn" title="Add">+</div>
        </div>
        <div class="todo-filters">
          <button class="todo-filter active" data-filter="all">All</button>
          <button class="todo-filter" data-filter="active">Active</button>
          <button class="todo-filter" data-filter="done">Done</button>
        </div>
        <div class="todo-list"></div>
        <div class="todo-footer">
          <span class="todo-count">0 items left</span>
          <span class="todo-clear">Clear completed</span>
        </div>
      </div>
    `;

    const input = body.querySelector(".todo-input");
    const addBtn = body.querySelector(".todo-add-btn");
    const listEl = body.querySelector(".todo-list");
    const countEl = body.querySelector(".todo-count");
    const clearEl = body.querySelector(".todo-clear");
    const filterBtns = body.querySelectorAll(".todo-filter");

    function persist(){
      try{ localStorage.setItem(STORE_KEY, JSON.stringify(todos)); }
      catch(e){ console.warn("on369: todo save failed", e); }
    }
    function checkSVG(){
      return `<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L19 7"></path></svg>`;
    }

    function renderList(){
      const visible = todos.filter(t=>{
        if(filter==="active") return !t.done;
        if(filter==="done") return t.done;
        return true;
      });
      if(visible.length===0){
        listEl.innerHTML = `<div class="todo-empty">${todos.length===0 ? "No tasks yet — add one above." : "Nothing here."}</div>`;
      }else{
        listEl.innerHTML = visible.map(t=>`
          <div class="todo-item${t.done?" done":""}" data-id="${t.id}">
            <div class="todo-check">${checkSVG()}</div>
            <span class="todo-text">${escapeHtml(t.text)}</span>
            <div class="todo-del" title="Delete">&#10005;</div>
          </div>
        `).join("");
      }
      const remaining = todos.filter(t=>!t.done).length;
      countEl.textContent = `${remaining} item${remaining===1?"":"s"} left`;

      listEl.querySelectorAll(".todo-check, .todo-text").forEach(el=>{
        el.addEventListener("click", ()=>{
          const id = el.closest(".todo-item").dataset.id;
          const t = todos.find(x=>x.id===id);
          if(t){ t.done = !t.done; persist(); renderList(); }
        });
      });
      listEl.querySelectorAll(".todo-del").forEach(el=>{
        el.addEventListener("click", (e)=>{
          e.stopPropagation();
          const id = el.closest(".todo-item").dataset.id;
          todos = todos.filter(x=>x.id!==id);
          persist(); renderList();
        });
      });
    }

    function addTodo(){
      const text = input.value.trim();
      if(!text) return;
      todos.push({ id: uid(), text, done:false, createdAt: Date.now() });
      input.value = "";
      persist();
      renderList();
      input.focus();
    }

    addBtn.addEventListener("click", addTodo);
    input.addEventListener("keydown", (e)=>{
      if(e.key==="Enter") addTodo();
    });
    filterBtns.forEach(btn=>{
      btn.addEventListener("click", ()=>{
        filter = btn.dataset.filter;
        filterBtns.forEach(b=> b.classList.toggle("active", b===btn));
        renderList();
      });
    });
    clearEl.addEventListener("click", ()=>{
      todos = todos.filter(t=>!t.done);
      persist();
      renderList();
    });

    renderList();
  }

  /* ============ SEARCH BAR ============ */
  const ENGINES = {
    google:     { url: "https://www.google.com/search?q=",   domain: "google.com",      letter: "G", color: "#4A8DF0" },
    bing:       { url: "https://www.bing.com/search?q=",     domain: "bing.com",        letter: "B", color: "#008373" },
    duckduckgo: { url: "https://duckduckgo.com/?q=",         domain: "duckduckgo.com",  letter: "D", color: "#DE5833" },
    yahoo:      { url: "https://search.yahoo.com/search?p=", domain: "search.yahoo.com",letter: "Y", color: "#7B2FF7" }
  };
  let searchMode = "app";
  const searchInput = document.getElementById("searchInput");
  const enginePicker = document.getElementById("enginePicker");
  const searchModeWrap = document.getElementById("searchMode");

  if(!ENGINES[state.searchEngine]) state.searchEngine = "google";
  Object.keys(ENGINES).forEach(key=>{
    const eng = ENGINES[key];
    const btn = document.createElement("div");
    btn.className = "engine-btn" + (key === state.searchEngine ? " active" : "");
    btn.dataset.engine = key;
    btn.title = key.charAt(0).toUpperCase() + key.slice(1);

    // Real logo, fetched live: DuckDuckGo's icon service first (it 404s cleanly
    // on a miss), Google's favicon service second, colored letter as the final
    // offline-safe fallback. Built via DOM methods (not innerHTML/inline
    // onerror) so there's no HTML-attribute string-escaping to get wrong.
    const img = document.createElement("img");
    img.alt = eng.letter;
    img.src = `https://icons.duckduckgo.com/ip3/${eng.domain}.ico`;
    img.onerror = function(){
      img.onerror = function(){
        btn.innerHTML = "";
        btn.style.background = eng.color;
        btn.textContent = eng.letter;
      };
      img.src = `https://www.google.com/s2/favicons?sz=64&domain=${eng.domain}`;
    };
    btn.appendChild(img);

    btn.addEventListener("click", ()=>{
      state.searchEngine = key;
      enginePicker.querySelectorAll(".engine-btn").forEach(b=> b.classList.toggle("active", b.dataset.engine===key));
      save();
      searchInput.focus();
    });
    enginePicker.appendChild(btn);
  });

  searchModeWrap.querySelectorAll(".mode-btn").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      searchMode = btn.dataset.mode;
      searchModeWrap.querySelectorAll(".mode-btn").forEach(b=> b.classList.toggle("active", b===btn));
      enginePicker.classList.toggle("visible", searchMode === "web");
      searchInput.placeholder = searchMode === "web" ? "Search the web…" : "Search your desktop…";
      if(searchMode === "app") applyAppSearch(searchInput.value);
      else clearAppSearch();
      searchInput.focus();
    });
  });

  searchInput.addEventListener("input", ()=>{
    if(searchMode === "app") applyAppSearch(searchInput.value);
  });
  searchInput.addEventListener("keydown", (e)=>{
    if(e.key === "Enter" && searchMode === "web") doWebSearch();
    if(e.key === "Escape"){ searchInput.value = ""; applyAppSearch(""); searchInput.blur(); }
  });
  document.getElementById("searchGo").addEventListener("click", ()=>{
    if(searchMode === "web") doWebSearch(); else searchInput.focus();
  });

  function doWebSearch(){
    const q = searchInput.value.trim();
    if(!q) return;
    const engine = ENGINES[state.searchEngine] || ENGINES.google;
    window.open(engine.url + encodeURIComponent(q), "_blank", "noopener");
  }

  function applyAppSearch(raw){
    const query = (raw || "").trim().toLowerCase();
    const rootItems = state.icons.filter(i=>i.parentId===null);
    let anyMatch = !query;
    gridLayer.querySelectorAll(".icon").forEach(el=>{
      const item = rootItems.find(i=>i.id===el.dataset.id);
      const match = !query || (item && item.label.toLowerCase().includes(query));
      el.style.display = match ? "" : "none";
      if(match) anyMatch = true;
    });
    if(query && !anyMatch){
      emptyHint.innerHTML = `No matches for "<b>${escapeHtml(raw.trim())}</b>"`;
      emptyHint.style.display = "block";
    }else if(!query){
      emptyHint.innerHTML = "Empty desktop.<br><b>Right-click</b> to add a bookmark or folder.";
      emptyHint.style.display = rootItems.length === 0 ? "block" : "none";
    }else{
      emptyHint.style.display = "none";
    }
  }
  function clearAppSearch(){
    gridLayer.querySelectorAll(".icon").forEach(el=> el.style.display = "");
    emptyHint.innerHTML = "Empty desktop.<br><b>Right-click</b> to add a bookmark or folder.";
    emptyHint.style.display = state.icons.filter(i=>i.parentId===null).length === 0 ? "block" : "none";
  }

  /* ============ INIT ============ */
  applyAppearance();
  render();

  let resizeTimer = null;
  window.addEventListener("resize", ()=>{
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(render, 120);
  });

})();
</script>
