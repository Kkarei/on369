<!DOCTYPE html>
<html lang="en" data-theme="noctis" data-wallpaper="dots">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>on369 — Your Personal Web Desktop </title>
<link rel="icon" type="image/png" href="icons/favicon.png">
<link rel="manifest" href="manifest.json">
<style>
  :root{
    --font-display: -apple-system, "Segoe UI", ui-sans-serif, system-ui, sans-serif;
    --font-body: -apple-system, "Segoe UI", ui-sans-serif, system-ui, sans-serif;
    --font-mono: ui-monospace, "SF Mono", "Cascadia Mono", "JetBrains Mono", Menlo, Consolas, monospace;

    --cell-w: 104px;
    --cell-h: 118px;
    --icon-size: 56px;
    --radius: 14px;
    --topbar-h: 44px;
    --searchbar-h: 58px;
  }

  @media (max-width: 640px){
    :root{
      --cell-w: 80px;
      --cell-h: 94px;
      --icon-size: 46px;
      --topbar-h: 40px;
      --searchbar-h: 54px;
    }
  }
  @media (max-width: 380px){
    :root{
      --cell-w: 72px;
      --cell-h: 88px;
      --icon-size: 42px;
    }
  }

  /* ---------- THEME: noctis (dark, cool) ---------- */
  html[data-theme="noctis"]{
    --bg-0: #0c0e13;
    --bg-1: #12151c;
    --bg-glow: rgba(124,159,255,0.10);
    --glow-1: rgba(124,159,255,0.16);
    --glow-2: rgba(242,166,90,0.10);
    --surface: rgba(255,255,255,0.055);
    --surface-hover: rgba(255,255,255,0.10);
    --surface-selected: rgba(124,159,255,0.18);
    --border: rgba(255,255,255,0.09);
    --border-strong: rgba(255,255,255,0.18);
    --text-primary: #e9ebf1;
    --text-secondary: #8b90a0;
    --text-tertiary: #5a5f6d;
    --accent: #7c9fff;
    --accent-strong: #a4bcff;
    --warm: #f2a65a;
    --danger: #ea6b83;
    --dot: rgba(255,255,255,0.055);
    --shadow: 0 8px 24px rgba(0,0,0,0.35);
    --shadow-soft: 0 2px 8px rgba(0,0,0,0.25);
    --scrollbar: rgba(255,255,255,0.15);
    --swatch-a: #12151c;
    --swatch-b: #7c9fff;
  }

  /* ---------- THEME: daylight (light, clean) ---------- */
  html[data-theme="daylight"]{
    --bg-0: #eef0f4;
    --bg-1: #e4e7ee;
    --bg-glow: rgba(90,120,255,0.08);
    --glow-1: rgba(90,120,255,0.14);
    --glow-2: rgba(217,138,61,0.08);
    --surface: rgba(255,255,255,0.65);
    --surface-hover: rgba(255,255,255,0.9);
    --surface-selected: rgba(90,120,255,0.16);
    --border: rgba(20,25,40,0.08);
    --border-strong: rgba(20,25,40,0.16);
    --text-primary: #1b1e27;
    --text-secondary: #5c6070;
    --text-tertiary: #8a8e9c;
    --accent: #4f6fe0;
    --accent-strong: #3a56c9;
    --warm: #d98a3d;
    --danger: #d64a63;
    --dot: rgba(20,25,40,0.07);
    --shadow: 0 8px 24px rgba(30,35,60,0.12);
    --shadow-soft: 0 2px 8px rgba(30,35,60,0.08);
    --scrollbar: rgba(20,25,40,0.15);
    --swatch-a: #eef0f4;
    --swatch-b: #4f6fe0;
  }

  /* ---------- THEME: dune (warm dusk) ---------- */
  html[data-theme="dune"]{
    --bg-0: #201a14;
    --bg-1: #2a2219;
    --bg-glow: rgba(212,160,84,0.10);
    --glow-1: rgba(212,160,84,0.16);
    --glow-2: rgba(91,138,130,0.12);
    --surface: rgba(255,247,235,0.055);
    --surface-hover: rgba(255,247,235,0.10);
    --surface-selected: rgba(212,160,84,0.20);
    --border: rgba(255,247,235,0.09);
    --border-strong: rgba(255,247,235,0.18);
    --text-primary: #f0e6d8;
    --text-secondary: #b3a189;
    --text-tertiary: #7d7061;
    --accent: #d4a054;
    --accent-strong: #e0b471;
    --warm: #5b8a82;
    --danger: #e08a6b;
    --dot: rgba(255,247,235,0.06);
    --shadow: 0 8px 24px rgba(0,0,0,0.35);
    --shadow-soft: 0 2px 8px rgba(0,0,0,0.25);
    --scrollbar: rgba(255,247,235,0.15);
    --swatch-a: #201a14;
    --swatch-b: #d4a054;
  }

  /* ---------- THEME: graphite (quiet, neutral) ---------- */
  html[data-theme="graphite"]{
    --bg-0: #1b1e23;
    --bg-1: #23262c;
    --bg-glow: rgba(143,160,184,0.08);
    --glow-1: rgba(143,160,184,0.12);
    --glow-2: rgba(143,160,184,0.06);
    --surface: rgba(255,255,255,0.05);
    --surface-hover: rgba(255,255,255,0.09);
    --surface-selected: rgba(143,160,184,0.18);
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.16);
    --text-primary: #e4e6ea;
    --text-secondary: #8b909c;
    --text-tertiary: #585c65;
    --accent: #8fa0b8;
    --accent-strong: #aebbcd;
    --warm: #b8a088;
    --danger: #d9788a;
    --dot: rgba(255,255,255,0.05);
    --shadow: 0 8px 24px rgba(0,0,0,0.35);
    --shadow-soft: 0 2px 8px rgba(0,0,0,0.25);
    --scrollbar: rgba(255,255,255,0.14);
    --swatch-a: #1b1e23;
    --swatch-b: #8fa0b8;
  }

  /* ---------- THEME: verdant (deep forest) ---------- */
  html[data-theme="verdant"]{
    --bg-0: #0f1a14;
    --bg-1: #16241c;
    --bg-glow: rgba(108,196,153,0.09);
    --glow-1: rgba(108,196,153,0.15);
    --glow-2: rgba(212,176,106,0.09);
    --surface: rgba(228,237,231,0.055);
    --surface-hover: rgba(228,237,231,0.10);
    --surface-selected: rgba(108,196,153,0.18);
    --border: rgba(228,237,231,0.09);
    --border-strong: rgba(228,237,231,0.17);
    --text-primary: #e4ede7;
    --text-secondary: #90a89b;
    --text-tertiary: #5c7267;
    --accent: #6cc499;
    --accent-strong: #8ed4b2;
    --warm: #d4b06a;
    --danger: #e08a7a;
    --dot: rgba(228,237,231,0.055);
    --shadow: 0 8px 24px rgba(0,0,0,0.35);
    --shadow-soft: 0 2px 8px rgba(0,0,0,0.25);
    --scrollbar: rgba(228,237,231,0.15);
    --swatch-a: #0f1a14;
    --swatch-b: #6cc499;
  }

  *{ box-sizing: border-box; }
  html,body{ height:100%; margin:0; }
  body{
    font-family: var(--font-body);
    color: var(--text-primary);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }

  /* ---------- WALLPAPER ---------- */
  #desktop{
    position: relative;
    width: 100vw;
    height: 100vh;
    background: var(--bg-0);
    overflow: auto;
  }
  html[data-wallpaper="dots"] #desktop{
    background-image:
      radial-gradient(circle at 18% 12%, var(--bg-glow), transparent 45%),
      radial-gradient(circle at 82% 88%, var(--bg-glow), transparent 40%),
      radial-gradient(var(--dot) 1.4px, transparent 1.4px);
    background-color: var(--bg-0);
    background-size: auto, auto, 26px 26px;
  }
  html[data-wallpaper="aurora"] #desktop{
    background:
      radial-gradient(ellipse 60% 40% at 20% 0%, var(--glow-1), transparent 60%),
      radial-gradient(ellipse 50% 35% at 85% 15%, var(--glow-2), transparent 60%),
      radial-gradient(ellipse 60% 50% at 50% 100%, var(--glow-1), transparent 60%),
      var(--bg-0);
  }
  html[data-wallpaper="grid"] #desktop{
    background-image:
      radial-gradient(circle at 50% 0%, var(--bg-glow), transparent 55%),
      linear-gradient(var(--dot) 1px, transparent 1px),
      linear-gradient(90deg, var(--dot) 1px, transparent 1px);
    background-color: var(--bg-0);
    background-size: auto, 52px 52px, 52px 52px;
  }

  #desktop::-webkit-scrollbar{ width: 10px; height:10px; }
  #desktop::-webkit-scrollbar-thumb{ background: var(--scrollbar); border-radius: 8px; }

  /* ---------- TOP BAR ---------- */
  #topbar{
    position: fixed; top: 0; left: 0; right: 0;
    height: var(--topbar-h);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px;
    z-index: 500;
    pointer-events: none;
  }
  #topbar > *{ pointer-events: auto; }
  .brand{
    display:flex; align-items:center; gap:8px;
  }
  .app-logo{
    width: 26px; height: 26px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--warm));
    display:flex; align-items:center; justify-content:center;
    box-shadow: var(--shadow-soft);
    flex-shrink: 0;
  }
  .app-logo span{
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 12.5px;
    color: #fff;
    letter-spacing: -0.02em;
  }
  .app-name{
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 14.5px;
    letter-spacing: -0.01em;
    color: var(--text-primary);
    white-space: nowrap;
  }
  @media (max-width: 640px){
    .app-logo{ width:22px; height:22px; border-radius:7px; }
    .app-logo span{ font-size: 10.5px; }
    .app-name{ font-size: 13px; }
  }

  .topbar-right{ display:flex; align-items:center; gap:10px; }

  #clock{
    font-family: var(--font-mono);
    font-size: 12.5px;
    color: var(--text-secondary);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 10px;
    backdrop-filter: blur(10px);
    display:flex; gap:8px; align-items:baseline;
    letter-spacing: 0.02em;
  }
  #clock .date{ color: var(--text-tertiary); }

  .iconbtn{
    width: 32px; height: 32px;
    border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    cursor: pointer;
    color: var(--text-secondary);
    backdrop-filter: blur(10px);
    transition: background .12s ease, color .12s ease, transform .08s ease;
  }
  .iconbtn:hover{ background: var(--surface-hover); color: var(--text-primary); }
  .iconbtn:active{ transform: scale(0.94); }
  .iconbtn svg{ width:16px; height:16px; }

  /* ---------- SEARCH BAR ---------- */
  #searchBar{
    position: fixed;
    top: var(--topbar-h);
    left: 0; right: 0;
    height: var(--searchbar-h);
    z-index: 480;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 16px;
    pointer-events: none;
  }
  #searchBar > *{ pointer-events: auto; }
  .search-shell{
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    max-width: 560px;
    height: 44px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0 8px 0 6px;
    backdrop-filter: blur(14px);
    box-shadow: var(--shadow-soft), 0 0 0 1px transparent;
    transition: box-shadow .18s ease, border-color .18s ease;
  }
  .search-shell:focus-within{
    border-color: var(--border-strong);
    box-shadow: var(--shadow-soft), 0 0 0 3px var(--surface-selected);
  }
  .search-mode{
    display: flex;
    background: var(--bg-0);
    border-radius: 9px;
    padding: 2px;
    gap: 2px;
    flex-shrink: 0;
  }
  .mode-btn{
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 700;
    padding: 7px 11px;
    border-radius: 7px;
    cursor: pointer;
  }
  .mode-btn.active{ background: var(--accent); color: #fff; }

  .engine-picker{
    display: none;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
    padding: 0 2px;
  }
  .engine-picker.visible{ display: flex; }
  .engine-btn{
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1.5px solid transparent;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-size: 10px;
    font-weight: 800;
    color: #fff;
    cursor: pointer;
    opacity: 0.55;
    transform: scale(0.92);
    transition: opacity .12s ease, transform .12s ease, border-color .12s ease;
  }
  .engine-btn.active{ opacity: 1; transform: scale(1); border-color: var(--text-primary); }

  .search-input-wrap{
    flex: 1;
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 6px;
  }
  .search-input-wrap svg{ width:16px; height:16px; color: var(--text-tertiary); flex-shrink:0; }
  #searchInput{
    flex: 1;
    min-width: 0;
    border: none;
    background: transparent;
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 14px;
    outline: none;
    user-select: text;
    -webkit-user-select: text;
  }
  #searchInput::placeholder{ color: var(--text-tertiary); }
  #searchGo{
    width: 32px; height: 32px;
    flex-shrink: 0;
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  #searchGo:hover{ background: var(--accent-strong); border-color: var(--accent-strong); }

  @media (max-width: 640px){
    .search-shell{ max-width: 100%; height: 40px; gap: 6px; }
    .mode-btn{ padding: 6px 8px; font-size: 10.5px; }
    #searchInput{ font-size: 14px; }
    .engine-btn{ width: 20px; height: 20px; font-size: 9px; }
    #searchGo{ width: 28px; height: 28px; }
  }

  /* ---------- SETTINGS POPOVER ---------- */
  #settingsPop{
    position: fixed;
    top: 52px; right: 16px;
    width: 264px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: var(--shadow);
    padding: 16px;
    z-index: 900;
    display: none;
    backdrop-filter: blur(16px);
    max-height: calc(100vh - 68px);
    overflow-y: auto;
  }
  #settingsPop.open{ display:block; }
  .pop-label{
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-tertiary);
    font-weight: 700;
    margin: 4px 0 9px;
  }
  .theme-grid{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 9px;
    margin-bottom: 16px;
  }
  .theme-card{
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    cursor: pointer;
  }
  .theme-swatch{
    width: 100%;
    height: 42px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    position: relative;
    transition: border-color .12s ease, transform .12s ease;
  }
  .theme-card:hover .theme-swatch{ transform: translateY(-1px); }
  .theme-card.active .theme-swatch{
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--surface-selected);
  }
  .theme-swatch .dot{
    position: absolute; right: 6px; bottom: 6px;
    width: 9px; height: 9px; border-radius: 50%;
    box-shadow: 0 0 0 2px rgba(0,0,0,0.18);
  }
  .theme-name{
    font-size: 10px;
    font-weight: 600;
    color: var(--text-secondary);
  }
  .theme-card.active .theme-name{ color: var(--text-primary); }

  .wp-row{ display:flex; gap:8px; }
  .wp-swatch{
    flex:1; height:34px; border-radius:8px; cursor:pointer;
    border: 1.5px solid var(--border);
    transition: border-color .12s ease;
  }
  .wp-swatch.active{ border-color: var(--accent); }
  .wp-swatch.wp-dots{ background: radial-gradient(circle, var(--accent) 1px, transparent 1.2px) 0 0/8px 8px, var(--bg-0); }
  .wp-swatch.wp-aurora{ background: radial-gradient(ellipse at 30% 20%, color-mix(in srgb, var(--accent) 55%, transparent), transparent 65%), var(--bg-0); }
  .wp-swatch.wp-grid{ background: linear-gradient(var(--border-strong) 1px, transparent 1px) 0 0/9px 9px, linear-gradient(90deg,var(--border-strong) 1px, transparent 1px) 0 0/9px 9px, var(--bg-0); }

  /* ---------- GRID / ICONS ---------- */
  #gridLayer{
    position: relative;
    padding: calc(var(--topbar-h) + var(--searchbar-h) + 22px) 24px 90px;
    min-height: 100vh;
  }
  @media (max-width: 640px){
    #gridLayer{ padding-left: 12px; padding-right: 12px; }
  }

  .icon{
    position: absolute;
    width: var(--cell-w);
    height: var(--cell-h);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding-top: 10px;
    border-radius: 12px;
    cursor: default;
    touch-action: none;
    transition: left .16s cubic-bezier(.2,.8,.3,1), top .16s cubic-bezier(.2,.8,.3,1), background .12s ease;
  }
  .icon.dragging{ transition: none; z-index: 50; opacity: 0.92; }
  .icon.dragging .glyph-wrap{ transform: none; }
  .icon.dragging .icon-glyph{ box-shadow: var(--shadow); }
  .icon:hover{ background: var(--surface); }
  .icon.selected{ background: var(--surface-selected); }
  .icon:hover .glyph-wrap{ transform: translateY(-3px); }
  .icon:hover .icon-glyph{ box-shadow: var(--shadow); }

  .glyph-wrap{ position: relative; transition: transform .16s cubic-bezier(.2,.8,.3,1); }
  .icon-glyph{
    width: var(--icon-size);
    height: var(--icon-size);
    border-radius: 13px;
    display:flex; align-items:center; justify-content:center;
    background: var(--surface);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-soft);
    position: relative;
    overflow: hidden;
    transition: transform .16s cubic-bezier(.2,.8,.3,1), box-shadow .16s ease;
  }
  .icon-glyph img{ width: 60%; height:60%; object-fit:contain; border-radius:4px; }
  .icon-glyph svg{ width: 60%; height: 60%; }
  .icon-glyph .letter{
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 20px;
    color: var(--text-primary);
  }
  .icon-glyph .count-badge{
    position: absolute; top: -4px; right: -4px;
    min-width: 16px; height: 16px; padding: 0 4px;
    border-radius: 8px;
    background: var(--bg-1);
    border: 1.5px solid var(--bg-0);
    color: var(--text-secondary);
    font-family: var(--font-mono);
    font-size: 9.5px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
    overflow: visible;
  }

  .icon-label{
    font-size: 11.5px;
    color: var(--text-primary);
    text-align: center;
    max-width: 92px;
    line-height: 1.25;
    padding: 2px 6px;
    border-radius: 5px;
    word-break: break-word;
    max-height: 2.6em;
    overflow: hidden;
  }
  .icon.selected .icon-label{ background: var(--accent); color: #fff; }
  .icon-label[contenteditable="true"]{
    background: var(--bg-1);
    color: var(--text-primary);
    outline: 1.5px solid var(--accent);
    user-select: text;
    -webkit-user-select: text;
    max-height: none;
    overflow: visible;
  }
  @media (max-width: 640px){
    .icon-label{ font-size: 10.5px; max-width: 70px; }
  }

  /* ---------- RUBBER BAND ---------- */
  #rubberband{
    position: absolute;
    border: 1px solid var(--accent);
    background: var(--surface-selected);
    display: none;
    z-index: 40;
    border-radius: 3px;
    pointer-events: none;
  }

  /* ---------- CONTEXT MENU ---------- */
  .ctx-menu{
    position: fixed;
    min-width: 190px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: var(--shadow);
    padding: 6px;
    z-index: 1000;
    backdrop-filter: blur(16px);
  }
  .ctx-item{
    padding: 8px 10px;
    font-size: 13px;
    color: var(--text-primary);
    border-radius: 7px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .ctx-item:hover{ background: var(--surface-hover); }
  .ctx-item.danger{ color: var(--danger); }
  .ctx-sep{ height:1px; background: var(--border); margin: 6px 4px; }
  .ctx-hint{ color: var(--text-tertiary); font-size: 11px; }

  /* ---------- FAB ---------- */
  #fab{
    position: fixed;
    right: 22px; bottom: 22px;
    width: 50px; height: 50px;
    border-radius: 16px;
    background: var(--accent);
    color: #fff;
    display:flex; align-items:center; justify-content:center;
    box-shadow: var(--shadow);
    cursor: pointer;
    z-index: 600;
    transition: transform .1s ease, border-radius .15s ease;
  }
  #fab:hover{ transform: translateY(-2px); }
  #fab:active{ transform: scale(0.94); }
  #fab svg{ width: 22px; height: 22px; }

  /* ---------- STATUS ---------- */
  #status{
    position: fixed;
    left: 16px; bottom: 16px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-tertiary);
    z-index: 400;
  }

  /* ---------- MODAL ---------- */
  .overlay{
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 2000;
  }
  .overlay.open{ display:flex; }
  .modal{
    width: 360px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    box-shadow: var(--shadow);
  }
  .modal h3{
    margin: 0 0 14px;
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 700;
  }
  .field{ margin-bottom: 12px; }
  .field label{
    display:block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-tertiary);
    font-weight: 700;
    margin-bottom: 6px;
  }
  .field input[type=text], .field input[type=url]{
    width: 100%;
    padding: 9px 11px;
    border-radius: 9px;
    border: 1px solid var(--border-strong);
    background: var(--bg-0);
    color: var(--text-primary);
    font-size: 13px;
    font-family: var(--font-body);
    user-select: text;
    -webkit-user-select: text;
  }
  .field input:focus{ outline: 1.5px solid var(--accent); }
  .colorpicks{ display:flex; gap:8px; }
  .colorpick{
    width: 26px; height: 26px; border-radius: 50%;
    cursor: pointer; border: 2px solid transparent;
  }
  .colorpick.active{ border-color: var(--text-primary); }
  .modal-actions{
    display:flex; justify-content:flex-end; gap:8px; margin-top: 16px;
  }
  .btn{
    padding: 8px 16px;
    border-radius: 9px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border-strong);
    background: transparent;
    color: var(--text-primary);
  }
  .btn.primary{
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn:hover{ opacity: 0.9; }

  /* ---------- FOLDER PANEL ---------- */
  #folderOverlay{
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    display:none;
    align-items: center; justify-content: center;
    z-index: 1500;
  }
  #folderOverlay.open{ display:flex; }
  #folderPanel{
    width: 560px;
    max-width: 92vw;
    height: 420px;
    max-height: 80vh;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 18px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #folderHeader{
    padding: 14px 18px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom: 1px solid var(--border);
  }
  #folderHeader h3{
    margin:0; font-family: var(--font-display); font-size: 14px; font-weight:700;
    display:flex; align-items:center; gap:8px;
  }
  #folderBody{
    position: relative;
    flex: 1;
    overflow: auto;
    padding: 20px;
  }
  #folderBody .empty-hint{
    color: var(--text-tertiary);
    font-size: 12.5px;
    text-align:center;
    margin-top: 60px;
  }

  /* ---------- EMPTY STATE ---------- */
  #emptyHint{
    position: fixed;
    top: 46%; left: 50%;
    transform: translate(-50%,-50%);
    text-align: center;
    color: var(--text-tertiary);
    font-size: 13px;
    pointer-events: none;
    z-index: 5;
    display: none;
  }
  #emptyHint b{ color: var(--text-secondary); }

  ::selection{ background: var(--accent); color:#fff; }
</style>
</head>
<body>

<div id="topbar">
  <div class="brand">

    <span class="app-name">on369</span>
  </div>
  <div class="topbar-right">
    <div id="clock"><span class="time">--:--</span><span class="date">--</span></div>
    <div class="iconbtn" id="settingsBtn" title="Appearance">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>

<!-- Add / Edit Bookmark Modal -->

      </div>

    <div id="folderBody"></div>

<script>
(function(){
  "use strict";

  /* ============ STATE ============ */
  const STORAGE_KEY = "on369.state.v1";
  const COLORS = ["#7c9fff","#f2a65a","#6bd1a0","#ea6b83","#c792ea","#57c7d4"];

  function uid(){ return Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4); }

  function seedState(){
    return {
      theme: "noctis",
      wallpaper: "dots",
      searchEngine: "google",
      icons: [
        { id: uid(), type:"folder", label:"Getting Started", color: COLORS[1], x:0, y:0, parentId:null },
        { id: uid(), type:"bookmark", label:"GitHub", url:"https://github.com", color: COLORS[0], x:1, y:0, parentId:null },
        { id: uid(), type:"bookmark", label:"Anthropic Docs", url:"https://docs.claude.com", color: COLORS[0], x:2, y:0, parentId:null },
        { id: uid(), type:"folder", label:"Read Later", color: COLORS[3], x:3, y:0, parentId:null },
        { id: uid(), type:"bookmark", label:"Welcome — right-click me!", url:"https://start.me", color: COLORS[2], x:0, y:1, parentId:null }
      ]
    };
  }

  function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return seedState();
      const parsed = JSON.parse(raw);
      if(!parsed.icons) return seedState();
      if(!parsed.searchEngine) parsed.searchEngine = "google";
      return parsed;
    }catch(e){
      console.warn("on369: state load failed, reseeding", e);
      return seedState();
    }
  }

  let state = loadState();
  let currentFolderId = null; // null = root desktop

  function save(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    catch(e){ console.warn("on369: save failed", e); }
  }

  /* ============ DOM REFS ============ */
  const gridLayer = document.getElementById("gridLayer");
  const desktop = document.getElementById("desktop");
  const rubberband = document.getElementById("rubberband");
  const emptyHint = document.getElementById("emptyHint");
  const statusEl = document.getElementById("status");
  const folderOverlay = document.getElementById("folderOverlay");
  const folderBody = document.getElementById("folderBody");
  const folderTitle = document.getElementById("folderTitle");

  function getCellSize(){
    const cs = getComputedStyle(document.documentElement);
    return {
      w: parseFloat(cs.getPropertyValue("--cell-w")) || 104,
      h: parseFloat(cs.getPropertyValue("--cell-h")) || 118
    };
  }
  const isCoarsePointer = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;

  let selected = new Set();
  let activeCtxMenu = null;

  /* ============ THEME / WALLPAPER ============ */
  const THEMES = [
    { id:"noctis",   name:"Noctis",   bg:"#0c0e13", bg2:"#1b2033", accent:"#7c9fff" },
    { id:"daylight", name:"Daylight", bg:"#eef0f4", bg2:"#cfd6e8", accent:"#4f6fe0" },
    { id:"dune",     name:"Dune",     bg:"#201a14", bg2:"#3a2c1c", accent:"#d4a054" },
    { id:"graphite", name:"Graphite", bg:"#1b1e23", bg2:"#2c3038", accent:"#8fa0b8" },
    { id:"verdant",  name:"Verdant",  bg:"#0f1a14", bg2:"#1c3226", accent:"#6cc499" }
  ];

  const themeGrid = document.getElementById("themeGrid");
  THEMES.forEach(t=>{
    const card = document.createElement("div");
    card.className = "theme-card";
    card.dataset.theme = t.id;
    card.innerHTML = `<div class="theme-swatch" style="background:linear-gradient(135deg, ${t.bg}, ${t.bg2})"><span class="dot" style="background:${t.accent}"></span></div><span class="theme-name">${t.name}</span>`;
    card.addEventListener("click", ()=>{ state.theme = t.id; applyAppearance(); save(); });
    themeGrid.appendChild(card);
  });

  function applyAppearance(){
    document.documentElement.setAttribute("data-theme", state.theme);
    document.documentElement.setAttribute("data-wallpaper", state.wallpaper);
    document.querySelectorAll(".theme-card").forEach(s=>{
      s.classList.toggle("active", s.dataset.theme === state.theme);
    });
    document.querySelectorAll(".wp-swatch").forEach(s=>{
      s.classList.toggle("active", s.dataset.wp === state.wallpaper);
    });
  }

  document.getElementById("settingsBtn").addEventListener("click", (e)=>{
    e.stopPropagation();
    document.getElementById("settingsPop").classList.toggle("open");
  });
  document.querySelectorAll(".wp-swatch").forEach(s=>{
    s.addEventListener("click", ()=>{ state.wallpaper = s.dataset.wp; applyAppearance(); save(); });
  });
  document.addEventListener("click", (e)=>{
    const pop = document.getElementById("settingsPop");
    if(pop.classList.contains("open") && !pop.contains(e.target) && e.target.id !== "settingsBtn"){
      pop.classList.remove("open");
    }
  });

  /* ============ CLOCK ============ */
  function tickClock(){
    const now = new Date();
    const time = now.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
    const date = now.toLocaleDateString([], {weekday:"short", month:"short", day:"numeric"});
    document.querySelector("#clock .time").textContent = time;
    document.querySelector("#clock .date").textContent = date;
  }
  tickClock();
  setInterval(tickClock, 15000);

  /* ============ ICON GLYPHS ============ */
  function folderSVG(color){
    return `<svg viewBox="0 0 24 24" fill="none"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7Z" fill="${color}" opacity="0.9"/><path d="M3 9h18" stroke="rgba(0,0,0,0.15)" stroke-width="1"/></svg>`;
  }
  function linkSVG(color){
    return `<svg viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.07 0l2-2a5 5 0 0 0-7.07-7.07l-1 1"></path><path d="M14 11a5 5 0 0 0-7.07 0l-2 2a5 5 0 0 0 7.07 7.07l1-1"></path></svg>`;
  }

  function faviconUrl(url){
    try{
      const u = new URL(url);
      return `https://www.google.com/s2/favicons?sz=64&domain=${u.hostname}`;
    }catch(e){ return null; }
  }

  function glyphFor(item){
    if(item.type === "folder"){
      const count = childrenOf(item.id).length;
      const badge = count > 0 ? `<span class="count-badge">${count > 99 ? "99+" : count}</span>` : "";
      return `<div class="glyph-wrap"><div class="icon-glyph" style="background:${item.color}22;border-color:${item.color}55">${folderSVG(item.color)}</div>${badge}</div>`;
    }
    const fav = faviconUrl(item.url);
    const fallback = linkSVG(item.color);
    if(fav){
      return `<div class="glyph-wrap"><div class="icon-glyph" style="border-color:${item.color}55">
        <img src="${fav}" alt="" onerror="this.replaceWith(Object.assign(document.createElement('span'),{innerHTML:\`${fallback.replace(/`/g,"'")}\`}).firstChild)">
      </div></div>`;
    }
    return `<div class="glyph-wrap"><div class="icon-glyph" style="border-color:${item.color}55">${fallback}</div></div>`;
  }

  /* ============ GRID PLACEMENT ============ */
  function childrenOf(parentId){
    return state.icons.filter(i => i.parentId === parentId);
  }

  function occupied(parentId, x, y, excludeId){
    return childrenOf(parentId).some(i => i.id !== excludeId && i.x === x && i.y === y);
  }

  function nextFreeSlot(parentId){
    for(let y=0; y<200; y++){
      for(let x=0; x<200; x++){
        if(!occupied(parentId, x, y, null)) return {x,y};
      }
    }
    return {x:0,y:0};
  }

  function nearestFreeSlot(parentId, targetX, targetY, excludeId){
    if(!occupied(parentId, targetX, targetY, excludeId)) return {x: Math.max(0,targetX), y: Math.max(0,targetY)};
    let best = null, bestDist = Infinity;
    for(let y=0; y<40; y++){
      for(let x=0; x<40; x++){
        if(occupied(parentId, x, y, excludeId)) continue;
        const d = Math.hypot(x-targetX, y-targetY);
        if(d < bestDist){ bestDist = d; best = {x,y}; }
      }
    }
    return best || {x:0,y:0};
  }

  /* ============ RENDER ============ */
  function renderInto(container, parentId, opts){
    opts = opts || {};
    // clear icons but keep rubberband if root
    Array.from(container.querySelectorAll(".icon")).forEach(n=>n.remove());
    const items = childrenOf(parentId).sort((a,b)=> a.y-b.y || a.x-b.x);
    const cell = getCellSize();

    items.forEach(item=>{
      const el = document.createElement("div");
      el.className = "icon" + (selected.has(item.id) ? " selected" : "");
      el.dataset.id = item.id;
      el.style.left = (item.x*cell.w) + "px";
      el.style.top = (item.y*cell.h) + "px";
      el.innerHTML = `${glyphFor(item)}<div class="icon-label" data-id="${item.id}">${escapeHtml(item.label)}</div>`;
      container.appendChild(el);
      wireIconEvents(el, item, parentId);
    });

    if(parentId === null){
      emptyHint.style.display = items.length === 0 ? "block" : "none";
      statusEl.textContent = `${state.icons.filter(i=>i.parentId===null).length} item${state.icons.filter(i=>i.parentId===null).length===1?"":"s"} on desktop`;
      if(typeof applyAppSearch === "function" && searchMode === "app" && searchInput && searchInput.value){
        applyAppSearch(searchInput.value);
      }
    }else{
      const hint = folderBody.querySelector(".empty-hint");
      if(items.length === 0){
        if(!hint){
          const h = document.createElement("div");
          h.className = "empty-hint";
          h.textContent = "This folder is empty. Right-click to add something.";
          container.appendChild(h);
        }
      }else if(hint){ hint.remove(); }
    }
  }

  function render(){
    renderInto(gridLayer, null);
    if(currentFolderId !== null){
      renderInto(folderBody, currentFolderId);
    }
  }

  function escapeHtml(s){
    const d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }

  /* ============ SELECTION ============ */
  function clearSelection(){ selected.clear(); render(); }

  function selectOnly(id){ selected = new Set([id]); render(); }

  /* ============ ICON EVENTS (drag, click, dblclick, rename) ============ */
  let dragState = null;

  function wireIconEvents(el, item, parentId){
    let downX, downY, moved=false, startLeft, startTop;

    el.addEventListener("pointerdown", (e)=>{
      if(e.pointerType === "mouse" && e.button !== 0) return;
      if(e.target.isContentEditable) return;
      e.stopPropagation();
      const pointerType = e.pointerType || "mouse";
      const pointerId = e.pointerId;
      downX = e.clientX; downY = e.clientY; moved = false;
      startLeft = parseFloat(el.style.left);
      startTop = parseFloat(el.style.top);
      try{ el.setPointerCapture(pointerId); }catch(err){}

      if(!e.shiftKey && !selected.has(item.id)){
        selectOnly(item.id);
        el.classList.add("selected");
      } else if(e.shiftKey){
        if(selected.has(item.id)) selected.delete(item.id); else selected.add(item.id);
        render();
      }

      dragState = { item, el, parentId, offsetX: downX-startLeft, offsetY: downY-startTop };

      function onMove(ev){
        if(ev.pointerId !== pointerId) return;
        const dx = ev.clientX - downX, dy = ev.clientY - downY;
        if(Math.abs(dx) > 4 || Math.abs(dy) > 4) moved = true;
        if(!moved) return;
        ev.preventDefault();
        el.classList.add("dragging");
        el.style.left = (startLeft + dx) + "px";
        el.style.top = (startTop + dy) + "px";
      }
      function onUp(ev){
        if(ev.pointerId !== pointerId) return;
        try{ el.releasePointerCapture(pointerId); }catch(err){}
        document.removeEventListener("pointermove", onMove);
        document.removeEventListener("pointerup", onUp);
        el.classList.remove("dragging");
        if(moved){
          const left = parseFloat(el.style.left), top = parseFloat(el.style.top);
          const cell = getCellSize();
          const gx = Math.round(left / cell.w);
          const gy = Math.round(top / cell.h);
          const slot = nearestFreeSlot(parentId, Math.max(0,gx), Math.max(0,gy), item.id);
          item.x = slot.x; item.y = slot.y;
          save();
          render();
        } else if(pointerType === "touch" || pointerType === "pen"){
          // Touch/stylus: a tap that didn't drag opens the item directly.
          openItem(item);
        }
        setTimeout(()=>{ moved = false; }, 0);
      }
      document.addEventListener("pointermove", onMove, {passive:false});
      document.addEventListener("pointerup", onUp);
    });

    // Desktop/mouse: double-click opens. Touch opens on single tap (handled above).
    el.addEventListener("dblclick", (e)=>{
      if(e.target.classList.contains("icon-label")) return;
      openItem(item);
    });

    const label = el.querySelector(".icon-label");
    label.addEventListener("dblclick", (e)=>{
      e.stopPropagation();
      startRename(label, item);
    });

    el.addEventListener("contextmenu", (e)=>{
      e.preventDefault(); e.stopPropagation();
      if(!selected.has(item.id)) selectOnly(item.id);
      showIconContextMenu(e.clientX, e.clientY, item, parentId);
    });
  }

  function startRename(label, item){
    label.contentEditable = "true";
    label.classList.add("editing");
    const range = document.createRange();
    range.selectNodeContents(label);
    const sel = window.getSelection();
    sel.removeAllRanges(); sel.addRange(range);
    label.focus();

    function commit(){
      label.contentEditable = "false";
      const text = label.textContent.trim() || "Untitled";
      item.label = text;
      save();
      render();
    }
    label.addEventListener("blur", commit, {once:true});
    label.addEventListener("keydown", function ke(e){
      if(e.key === "Enter"){ e.preventDefault(); label.blur(); }
      if(e.key === "Escape"){ label.textContent = item.label; label.blur(); }
    });
  }

  function openItem(item){
    if(item.type === "folder"){
      currentFolderId = item.id;
      folderTitle.innerHTML = `${folderSVG(item.color)} ${escapeHtml(item.label)}`;
      folderOverlay.classList.add("open");
      render();
    }else{
      window.open(item.url, "_blank", "noopener");
    }
  }

  document.getElementById("folderClose").addEventListener("click", ()=>{
    folderOverlay.classList.remove("open");
    currentFolderId = null;
  });
  folderOverlay.addEventListener("mousedown", (e)=>{
    if(e.target === folderOverlay){ folderOverlay.classList.remove("open"); currentFolderId = null; }
  });

  /* ============ DELETE ============ */
  function deleteSelected(){
    if(selected.size === 0) return;
    const toDelete = new Set(selected);
    // also delete descendants of any selected folder
    let changed = true;
    while(changed){
      changed = false;
      state.icons.forEach(i=>{
        if(toDelete.has(i.parentId) && !toDelete.has(i.id)){ toDelete.add(i.id); changed = true; }
      });
    }
    state.icons = state.icons.filter(i => !toDelete.has(i.id));
    selected.clear();
    save();
    render();
  }

  document.addEventListener("keydown", (e)=>{
    if(document.activeElement && document.activeElement.isContentEditable) return;
    if((e.key === "Delete" || e.key === "Backspace") && selected.size > 0){
      e.preventDefault();
      deleteSelected();
    }
    if(e.key === "Escape"){
      closeCtxMenu();
      if(itemOverlay.classList.contains("open")) closeItemModal();
      if(folderOverlay.classList.contains("open")){ folderOverlay.classList.remove("open"); currentFolderId=null; }
      clearSelection();
    }
  });

  /* ============ RUBBER BAND SELECT (desktop root, mouse only) ============ */
  let rbStart = null;
  desktop.addEventListener("pointerdown", (e)=>{
    if(e.pointerType !== "mouse") return; // touch scrolls/taps naturally instead
    if(e.button !== 0) return;
    if(e.target.closest(".icon")) return;
    closeCtxMenu();
    document.getElementById("settingsPop").classList.remove("open");
    const pointerId = e.pointerId;
    const rect = desktop.getBoundingClientRect();
    rbStart = { x: e.clientX - rect.left + desktop.scrollLeft, y: e.clientY - rect.top + desktop.scrollTop };
    rubberband.style.display = "block";
    rubberband.style.left = rbStart.x + "px";
    rubberband.style.top = rbStart.y + "px";
    rubberband.style.width = "0px";
    rubberband.style.height = "0px";
    if(!e.shiftKey) selected.clear();

    function onMove(ev){
      if(ev.pointerId !== pointerId) return;
      const r = desktop.getBoundingClientRect();
      const cx = ev.clientX - r.left + desktop.scrollLeft;
      const cy = ev.clientY - r.top + desktop.scrollTop;
      const x = Math.min(cx, rbStart.x), y = Math.min(cy, rbStart.y);
      const w = Math.abs(cx - rbStart.x), h = Math.abs(cy - rbStart.y);
      rubberband.style.left = x+"px"; rubberband.style.top = y+"px";
      rubberband.style.width = w+"px"; rubberband.style.height = h+"px";

      // hit test using each icon's real rendered size
      const bandRect = { left:x, top:y, right:x+w, bottom:y+h };
      gridLayer.querySelectorAll(".icon").forEach(el=>{
        const l = parseFloat(el.style.left), t = parseFloat(el.style.top);
        const r2 = { left:l, top:t, right:l+el.offsetWidth, bottom:t+el.offsetHeight };
        const hit = !(r2.right < bandRect.left || r2.left > bandRect.right || r2.bottom < bandRect.top || r2.top > bandRect.bottom);
        const id = el.dataset.id;
        if(hit) selected.add(id);
        el.classList.toggle("selected", selected.has(id));
      });
    }
    function onUp(ev){
      if(ev.pointerId !== pointerId) return;
      document.removeEventListener("pointermove", onMove);
      document.removeEventListener("pointerup", onUp);
      rubberband.style.display = "none";
      rbStart = null;
    }
    document.addEventListener("pointermove", onMove);
    document.addEventListener("pointerup", onUp);
  });

  desktop.addEventListener("click", (e)=>{
    if(!e.target.closest(".icon") && !rbStart){ clearSelection(); }
  });

  folderBody.addEventListener("pointerdown", (e)=>{
    if(e.target.closest(".icon")) return;
    if(!e.shiftKey){ selected.clear(); render(); }
  });

  /* ============ CONTEXT MENUS ============ */
  function closeCtxMenu(){
    if(activeCtxMenu){ activeCtxMenu.remove(); activeCtxMenu = null; }
  }
  document.addEventListener("click", (e)=>{
    if(activeCtxMenu && !activeCtxMenu.contains(e.target)) closeCtxMenu();
  });

  function buildMenu(items, x, y){
    closeCtxMenu();
    const menu = document.createElement("div");
    menu.className = "ctx-menu";
    items.forEach(it=>{
      if(it === "sep"){
        const s = document.createElement("div");
        s.className = "ctx-sep";
        menu.appendChild(s);
        return;
      }
      const row = document.createElement("div");
      row.className = "ctx-item" + (it.danger ? " danger" : "");
      row.innerHTML = `<span>${it.label}</span>${it.hint ? `<span class="ctx-hint">${it.hint}</span>` : ""}`;
      row.addEventListener("click", ()=>{ closeCtxMenu(); it.action(); });
      menu.appendChild(row);
    });
    document.body.appendChild(menu);
    const vw = window.innerWidth, vh = window.innerHeight;
    const mw = 200, mh = items.length * 34 + 20;
    menu.style.left = Math.min(x, vw-mw-8) + "px";
    menu.style.top = Math.min(y, vh-mh-8) + "px";
    activeCtxMenu = menu;
  }

  gridLayer.addEventListener("contextmenu", (e)=>{
    if(e.target.closest(".icon")) return;
    e.preventDefault();
    showCanvasContextMenu(e.clientX, e.clientY, null);
  });
  folderBody.addEventListener("contextmenu", (e)=>{
    if(e.target.closest(".icon")) return;
    e.preventDefault();
    showCanvasContextMenu(e.clientX, e.clientY, currentFolderId);
  });

  function showCanvasContextMenu(x, y, parentId){
    buildMenu([
      { label:"New bookmark", action: ()=> openItemModal({mode:"create", type:"bookmark", parentId}) },
      { label:"New folder", action: ()=> openItemModal({mode:"create", type:"folder", parentId}) },
      "sep",
      { label:"Sort by name", action: ()=> sortChildren(parentId, "name") },
      { label:"Arrange to grid", action: ()=> arrangeGrid(parentId) },
    ], x, y);
  }

  function showIconContextMenu(x, y, item, parentId){
    const opts = [
      { label: item.type==="folder" ? "Open folder" : "Open link", action: ()=> openItem(item) },
      { label:"Rename", hint:"dbl-click", action: ()=>{
          const el = (parentId===null?gridLayer:folderBody).querySelector(`.icon-label[data-id="${item.id}"]`);
          if(el) startRename(el, item);
        } },
    ];
    if(item.type === "bookmark"){
      opts.push({ label:"Edit URL", action: ()=> openItemModal({mode:"edit", item}) });
    }
    opts.push("sep");
    opts.push({ label: selected.size>1 ? `Delete ${selected.size} items` : "Delete", danger:true, hint:"Del", action: deleteSelected });
    buildMenu(opts, x, y);
  }

  function sortChildren(parentId, mode){
    const items = childrenOf(parentId).sort((a,b)=> a.label.localeCompare(b.label));
    const cell = getCellSize();
    let x=0, y=0, cols = Math.max(1, Math.floor((window.innerWidth-48)/cell.w));
    items.forEach((it)=>{
      it.x = x; it.y = y;
      x++; if(x>=cols){ x=0; y++; }
    });
    save(); render();
  }
  function arrangeGrid(parentId){ sortChildren(parentId); }

  /* ============ ADD / EDIT MODAL ============ */
  const itemOverlay = document.getElementById("itemOverlay");
  const itemLabel = document.getElementById("itemLabel");
  const itemUrl = document.getElementById("itemUrl");
  const urlField = document.getElementById("urlField");
  const colorPicks = document.getElementById("colorPicks");
  let modalCtx = null;
  let modalColor = COLORS[0];

  COLORS.forEach(c=>{
    const dot = document.createElement("div");
    dot.className = "colorpick";
    dot.style.background = c;
    dot.dataset.color = c;
    dot.addEventListener("click", ()=>{
      modalColor = c;
      colorPicks.querySelectorAll(".colorpick").forEach(d=>d.classList.toggle("active", d.dataset.color===c));
    });
    colorPicks.appendChild(dot);
  });

  function openItemModal(ctx){
    modalCtx = ctx;
    const title = document.getElementById("itemModalTitle");
    if(ctx.mode === "create"){
      title.textContent = ctx.type === "folder" ? "New folder" : "New bookmark";
      itemLabel.value = "";
      itemUrl.value = "";
      modalColor = COLORS[Math.floor(Math.random()*COLORS.length)];
      urlField.style.display = ctx.type === "folder" ? "none" : "block";
    }else{
      title.textContent = "Edit bookmark";
      itemLabel.value = ctx.item.label;
      itemUrl.value = ctx.item.url || "";
      modalColor = ctx.item.color;
      urlField.style.display = "block";
    }
    colorPicks.querySelectorAll(".colorpick").forEach(d=>d.classList.toggle("active", d.dataset.color===modalColor));
    itemOverlay.classList.add("open");
    setTimeout(()=> itemLabel.focus(), 30);
  }
  function closeItemModal(){ itemOverlay.classList.remove("open"); modalCtx = null; }

  document.getElementById("itemCancel").addEventListener("click", closeItemModal);
  itemOverlay.addEventListener("mousedown", (e)=>{ if(e.target === itemOverlay) closeItemModal(); });

  document.getElementById("itemSave").addEventListener("click", ()=>{
    if(!modalCtx) return;
    const label = itemLabel.value.trim();
    if(!label){ itemLabel.focus(); return; }
    let url = itemUrl.value.trim();

    if(modalCtx.mode === "create"){
      if(modalCtx.type === "bookmark"){
        if(!url){ itemUrl.focus(); return; }
        if(!/^https?:\/\//i.test(url)) url = "https://" + url;
      }
      const slot = nextFreeSlot(modalCtx.parentId);
      state.icons.push({
        id: uid(), type: modalCtx.type, label,
        url: modalCtx.type==="bookmark" ? url : undefined,
        color: modalColor, x: slot.x, y: slot.y, parentId: modalCtx.parentId
      });
    }else{
      modalCtx.item.label = label;
      if(modalCtx.item.type === "bookmark"){
        if(!/^https?:\/\//i.test(url)) url = "https://" + url;
        modalCtx.item.url = url;
      }
      modalCtx.item.color = modalColor;
    }
    save();
    closeItemModal();
    render();
  });

  /* ============ FAB ============ */
  document.getElementById("fab").addEventListener("click", ()=>{
    openItemModal({ mode:"create", type:"bookmark", parentId: currentFolderId });
  });

  /* ============ SEARCH BAR ============ */
  const ENGINES = {
    google:     { url: "https://www.google.com/search?q=",   letter: "G", color: "#4A8DF0" },
    bing:       { url: "https://www.bing.com/search?q=",     letter: "B", color: "#008373" },
    duckduckgo: { url: "https://duckduckgo.com/?q=",         letter: "D", color: "#DE5833" },
    yahoo:      { url: "https://search.yahoo.com/search?p=", letter: "Y", color: "#7B2FF7" }
  };
  let searchMode = "app";
  const searchInput = document.getElementById("searchInput");
  const enginePicker = document.getElementById("enginePicker");
  const searchModeWrap = document.getElementById("searchMode");

  if(!ENGINES[state.searchEngine]) state.searchEngine = "google";
  Object.keys(ENGINES).forEach(key=>{
    const eng = ENGINES[key];
    const btn = document.createElement("div");
    btn.className = "engine-btn" + (key === state.searchEngine ? " active" : "");
    btn.dataset.engine = key;
    btn.title = key.charAt(0).toUpperCase() + key.slice(1);
    btn.style.background = eng.color;
    btn.textContent = eng.letter;
    btn.addEventListener("click", ()=>{
      state.searchEngine = key;
      enginePicker.querySelectorAll(".engine-btn").forEach(b=> b.classList.toggle("active", b.dataset.engine===key));
      save();
      searchInput.focus();
    });
    enginePicker.appendChild(btn);
  });

  searchModeWrap.querySelectorAll(".mode-btn").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      searchMode = btn.dataset.mode;
      searchModeWrap.querySelectorAll(".mode-btn").forEach(b=> b.classList.toggle("active", b===btn));
      enginePicker.classList.toggle("visible", searchMode === "web");
      searchInput.placeholder = searchMode === "web" ? "Search the web…" : "Search your desktop…";
      if(searchMode === "app") applyAppSearch(searchInput.value);
      else clearAppSearch();
      searchInput.focus();
    });
  });

  searchInput.addEventListener("input", ()=>{
    if(searchMode === "app") applyAppSearch(searchInput.value);
  });
  searchInput.addEventListener("keydown", (e)=>{
    if(e.key === "Enter" && searchMode === "web") doWebSearch();
    if(e.key === "Escape"){ searchInput.value = ""; applyAppSearch(""); searchInput.blur(); }
  });
  document.getElementById("searchGo").addEventListener("click", ()=>{
    if(searchMode === "web") doWebSearch(); else searchInput.focus();
  });

  function doWebSearch(){
    const q = searchInput.value.trim();
    if(!q) return;
    const engine = ENGINES[state.searchEngine] || ENGINES.google;
    window.open(engine.url + encodeURIComponent(q), "_blank", "noopener");
  }

  function applyAppSearch(raw){
    const query = (raw || "").trim().toLowerCase();
    const rootItems = state.icons.filter(i=>i.parentId===null);
    let anyMatch = !query;
    gridLayer.querySelectorAll(".icon").forEach(el=>{
      const item = rootItems.find(i=>i.id===el.dataset.id);
      const match = !query || (item && item.label.toLowerCase().includes(query));
      el.style.display = match ? "" : "none";
      if(match) anyMatch = true;
    });
    if(query && !anyMatch){
      emptyHint.innerHTML = `No matches for "<b>${escapeHtml(raw.trim())}</b>"`;
      emptyHint.style.display = "block";
    }else if(!query){
      emptyHint.innerHTML = "Empty desktop.<br><b>Right-click</b> to add a bookmark or folder.";
      emptyHint.style.display = rootItems.length === 0 ? "block" : "none";
    }else{
      emptyHint.style.display = "none";
    }
  }
  function clearAppSearch(){
    gridLayer.querySelectorAll(".icon").forEach(el=> el.style.display = "");
    emptyHint.innerHTML = "Empty desktop.<br><b>Right-click</b> to add a bookmark or folder.";
    emptyHint.style.display = state.icons.filter(i=>i.parentId===null).length === 0 ? "block" : "none";
  }

  /* ============ INIT ============ */
  applyAppearance();
  render();

  let resizeTimer = null;
  window.addEventListener("resize", ()=>{
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(render, 120);
  });

})();
</script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js")
      .then(() => { console.log("Service Worker Registered"); })
      .catch((err) => { console.error("Service Worker Failed", err); });
  });
}
</script>
