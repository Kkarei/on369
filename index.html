<style>
  :root{
    --font-display: -apple-system, "Segoe UI", ui-sans-serif, system-ui, sans-serif;
    --font-body: -apple-system, "Segoe UI", ui-sans-serif, system-ui, sans-serif;
    --font-mono: ui-monospace, "SF Mono", "Cascadia Mono", "JetBrains Mono", Menlo, Consolas, monospace;

    --cell-w: 104px;
    --cell-h: 118px;
    --icon-size: 56px;
    --radius: 14px;
    --topbar-h: 44px;
    --searchbar-h: 58px;

    /* Safe-area insets (notches, gesture bars, rounded-corner screens).
       Defined once here so JS can read the resolved pixel value the same
       way it already reads --topbar-h/--searchbar-h via getComputedStyle. */
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
  }

  @media (max-width: 640px){
    :root{
      --cell-w: 80px;
      --cell-h: 94px;
      --icon-size: 46px;
      --topbar-h: 40px;
      --searchbar-h: 54px;
    }
  }

  /* Short + wide viewport (phone rotated to landscape): topbar+searchbar
     together shouldn't eat a huge share of the little vertical room there is. */
  @media (orientation: landscape) and (max-height: 480px){
    :root{
      --topbar-h: 36px;
      --searchbar-h: 44px;
      --cell-h: 84px;
    }
  }
  @media (max-width: 380px){
    :root{
      --cell-w: 72px;
      --cell-h: 88px;
      --icon-size: 42px;
    }
  }

  /* ---------- THEME: noctis (dark, cool) ---------- */
  html[data-theme="noctis"]{
    --bg-0: #0c0e13;
    --bg-1: #12151c;
    --bg-glow: rgba(124,159,255,0.10);
    --glow-1: rgba(124,159,255,0.16);
    --glow-2: rgba(242,166,90,0.10);
    --surface: rgba(255,255,255,0.055);
    --surface-hover: rgba(255,255,255,0.10);
    --surface-selected: rgba(124,159,255,0.18);
    --border: rgba(255,255,255,0.09);
    --border-strong: rgba(255,255,255,0.18);
    --text-primary: #e9ebf1;
    --text-secondary: #8b90a0;
    --text-tertiary: #5a5f6d;
    --accent: #7c9fff;
    --accent-strong: #a4bcff;
    --warm: #f2a65a;
    --danger: #ea6b83;
    --dot: rgba(255,255,255,0.055);
    --shadow: 0 8px 24px rgba(0,0,0,0.35);
    --shadow-soft: 0 2px 8px rgba(0,0,0,0.25);
    --scrollbar: rgba(255,255,255,0.15);

  }

  /* ---------- THEME: graphite (quiet, neutral) ---------- */

    --bg-1: #23262c;
    --bg-glow: rgba(143,160,184,0.08);
    --glow-1: rgba(143,160,184,0.12);
    --glow-2: rgba(143,160,184,0.06);
    --surface: rgba(255,255,255,0.05);
    --surface-hover: rgba(255,255,255,0.09);
    --surface-selected: rgba(143,160,184,0.18);
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.16);
    --text-primary: #e4e6ea;
    --text-secondary: #8b909c;
    --text-tertiary: #585c65;
    --accent: #8fa0b8;
    --accent-strong: #aebbcd;
    --warm: #b8a088;
    --danger: #d9788a;
    --dot: rgba(255,255,255,0.05);
    --shadow: 0 8px 24px rgba(0,0,0,0.35);
    --shadow-soft: 0 2px 8px rgba(0,0,0,0.25);
    --scrollbar: rgba(255,255,255,0.14);
    --swatch-a: #1b1e23;
    --swatch-b: #8fa0b8;
  }

  /* ---------- THEME: verdant (deep forest) ---------- */
  html[data-theme="verdant"]{
    --bg-0: #0f1a14;
    --bg-1: #16241c;
    --bg-glow: rgba(108,196,153,0.09);
    --glow-1: rgba(108,196,153,0.15);
    --glow-2: rgba(212,176,106,0.09);
    --surface: rgba(228,237,231,0.055);
    --surface-hover: rgba(228,237,231,0.10);
    --surface-selected: rgba(108,196,153,0.18);
    --border: rgba(228,237,231,0.09);
    --border-strong: rgba(228,237,231,0.17);
    --text-primary: #e4ede7;
    --text-secondary: #90a89b;
    --text-tertiary: #5c7267;
    --accent: #6cc499;
    --accent-strong: #8ed4b2;
    --warm: #d4b06a;
    --danger: #e08a7a;
    --dot: rgba(228,237,231,0.055);
    --shadow: 0 8px 24px rgba(0,0,0,0.35);
    --shadow-soft: 0 2px 8px rgba(0,0,0,0.25);
    --scrollbar: rgba(228,237,231,0.15);
    --swatch-a: #0f1a14;
    --swatch-b: #6cc499;
  }

  *{ box-sizing: border-box; }
  html,body{ height:100%; margin:0; }
  body{
    font-family: var(--font-body);
    color: var(--text-primary);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }

  /* Respect the OS-level "reduce motion" preference: this is the standard
     blanket approach (rather than annotating every transition individually),
     so any future animation automatically inherits the same guarantee. */
  @media (prefers-reduced-motion: reduce){
    *, *::before, *::after{
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
      scroll-behavior: auto !important;
    }
  }

  /* Universal keyboard-focus ring. Mouse/touch interaction never triggers
     :focus-visible, so this only appears for keyboard users — no visual
     change for pointer-driven use. */
  :focus-visible{
    outline: 2.5px solid var(--accent);
    outline-offset: 2px;
    border-radius: 4px;
  }
  .icon:focus-visible{
    outline-offset: -2px;
    background: var(--surface-selected);
  }

  /* ---------- WALLPAPER ---------- */
  #desktop{
    position: relative;
    width: 100vw;
    height: 100vh;
    background: var(--bg-0);
    overflow: auto;
  }
  html[data-wallpaper="dots"] #desktop{
    background-image:
      radial-gradient(circle at 18% 12%, var(--bg-glow), transparent 45%),
      radial-gradient(circle at 82% 88%, var(--bg-glow), transparent 40%),
      radial-gradient(var(--dot) 1.4px, transparent 1.4px);
    background-color: var(--bg-0);
    background-size: auto, auto, 26px 26px;
  }
  html[data-wallpaper="aurora"] #desktop{
    background:
      radial-gradient(ellipse 60% 40% at 20% 0%, var(--glow-1), transparent 60%),
      radial-gradient(ellipse 50% 35% at 85% 15%, var(--glow-2), transparent 60%),
      radial-gradient(ellipse 60% 50% at 50% 100%, var(--glow-1), transparent 60%),
      var(--bg-0);
  }
  html[data-wallpaper="grid"] #desktop{
    background-image:
      radial-gradient(circle at 50% 0%, var(--bg-glow), transparent 55%),
      linear-gradient(var(--dot) 1px, transparent 1px),
      linear-gradient(90deg, var(--dot) 1px, transparent 1px);
    background-color: var(--bg-0);
    background-size: auto, 52px 52px, 52px 52px;
  }

  #desktop::-webkit-scrollbar{ width: 10px; height:10px; }
  #desktop::-webkit-scrollbar-thumb{ background: var(--scrollbar); border-radius: 8px; }

  /* ---------- TOP BAR ---------- */
  #topbar{
    position: fixed; top: 0; left: 0; right: 0;
    height: calc(var(--topbar-h) + var(--safe-top));
    padding-top: var(--safe-top);
    display: flex; align-items: center; justify-content: space-between;
    padding-left: calc(16px + var(--safe-left));
    padding-right: calc(16px + var(--safe-right));
    z-index: 500;
    pointer-events: none;
  }
  #topbar > *{ pointer-events: auto; }
  .brand{
    display:flex; align-items:center; gap:8px;
  }
  .brand-logo{
    height: 28px;
    width: auto;
    display: block;
    flex-shrink: 0;
  }
  @media (max-width: 640px){
    .brand-logo{ height: 23px; }
  }

  .topbar-right{ display:flex; align-items:center; gap:10px; }

  #clock{
    font-family: var(--font-mono);
    font-size: 12.5px;
    color: var(--text-secondary);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 10px;
    backdrop-filter: blur(10px);
    display:flex; gap:8px; align-items:baseline;
    letter-spacing: 0.02em;
  }
  #clock .date{ color: var(--text-tertiary); }

  .iconbtn{
    width: 32px; height: 32px;
    border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    cursor: pointer;
    color: var(--text-secondary);
    backdrop-filter: blur(10px);
    transition: background .12s ease, color .12s ease, transform .08s ease;
  }
  .iconbtn:hover{ background: var(--surface-hover); color: var(--text-primary); }
  .iconbtn:active{ transform: scale(0.94); }
  .iconbtn svg{ width:16px; height:16px; }

  /* ---------- SEARCH BAR ---------- */
  #searchBar{
    position: fixed;
    top: calc(var(--topbar-h) + var(--safe-top));
    left: 0; right: 0;
    height: var(--searchbar-h);
    z-index: 480;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 calc(16px + var(--safe-right)) 0 calc(16px + var(--safe-left));
    pointer-events: none;
  }
  #searchBar > *{ pointer-events: auto; }
  .search-shell{
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    max-width: 560px;
    height: 44px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0 8px 0 6px;
    backdrop-filter: blur(14px);
    box-shadow: var(--shadow-soft), 0 0 0 1px transparent;
    transition: box-shadow .18s ease, border-color .18s ease;
  }
  .search-shell:focus-within{
    border-color: var(--border-strong);
    box-shadow: var(--shadow-soft), 0 0 0 3px var(--surface-selected);
  }
  .search-mode{
    display: flex;
    background: var(--bg-0);
    border-radius: 9px;
    padding: 2px;
    gap: 2px;
    flex-shrink: 0;
  }
  .mode-btn{
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 700;
    padding: 7px 11px;
    border-radius: 7px;
    cursor: pointer;
  }
  .mode-btn.active{ background: var(--accent); color: #fff; }

  .engine-picker{
    display: none;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
    padding: 0 2px;
  }
  .engine-picker.visible{ display: flex; }
  .engine-btn{
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1.5px solid transparent;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-size: 10px;
    font-weight: 800;
    color: #fff;
    background: #fff;
    cursor: pointer;
    opacity: 0.55;
    transform: scale(0.92);
    overflow: hidden;
    flex-shrink: 0;
    transition: opacity .12s ease, transform .12s ease, border-color .12s ease;
  }
  .engine-btn img{ width: 100%; height: 100%; object-fit: cover; display: block; }
  .engine-btn.active{ opacity: 1; transform: scale(1); border-color: var(--text-primary); }

  .search-input-wrap{
    flex: 1;
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 6px;
  }
  .search-input-wrap svg{ width:16px; height:16px; color: var(--text-tertiary); flex-shrink:0; }
  #searchInput{
    flex: 1;
    min-width: 0;
    border: none;
    background: transparent;
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 14px;
    outline: none;
    user-select: text;
    -webkit-user-select: text;
  }
  #searchInput::placeholder{ color: var(--text-tertiary); }
  #searchGo{
    width: 32px; height: 32px;
    flex-shrink: 0;
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  #searchGo:hover{ background: var(--accent-strong); border-color: var(--accent-strong); }

  @media (max-width: 640px){
    .search-shell{ max-width: 100%; height: 40px; gap: 6px; }
    .mode-btn{ padding: 6px 8px; font-size: 10.5px; }
    #searchInput{ font-size: 14px; }
    .engine-btn{ width: 20px; height: 20px; font-size: 9px; }
    #searchGo{ width: 28px; height: 28px; }
  }

  /* ---------- SETTINGS POPOVER ---------- */
  #settingsPop{
    position: fixed;
    top: 52px; right: 16px;
    width: 264px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: var(--shadow);
    padding: 16px;
    z-index: 900;
    display: none;
    backdrop-filter: blur(16px);
    max-height: calc(100vh - 68px);
    overflow-y: auto;
  }
  #settingsPop.open{ display:block; }
  .pop-label{
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-tertiary);
    font-weight: 700;
    margin: 4px 0 9px;
  }
  .theme-grid{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 9px;
    margin-bottom: 16px;
  }
  .theme-card{
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    cursor: pointer;
  }
  .theme-swatch{
    width: 100%;
    height: 42px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    position: relative;
    transition: border-color .12s ease, transform .12s ease;
  }
  .theme-card:hover .theme-swatch{ transform: translateY(-1px); }
  .theme-card.active .theme-swatch{
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--surface-selected);
  }
  .theme-swatch .dot{
    position: absolute; right: 6px; bottom: 6px;
    width: 9px; height: 9px; border-radius: 50%;
    box-shadow: 0 0 0 2px rgba(0,0,0,0.18);
  }
  .theme-name{
    font-size: 10px;
    font-weight: 600;
    color: var(--text-secondary);
  }
  .theme-card.active .theme-name{ color: var(--text-primary); }

  .wp-row{ display:flex; gap:8px; }
  .wp-swatch{
    flex:1; height:34px; border-radius:8px; cursor:pointer;
    border: 1.5px solid var(--border);
    transition: border-color .12s ease;
  }
  .wp-swatch.active{ border-color: var(--accent); }
  .wp-swatch.wp-dots{ background: radial-gradient(circle, var(--accent) 1px, transparent 1.2px) 0 0/8px 8px, var(--bg-0); }
  .wp-swatch.wp-aurora{ background: radial-gradient(ellipse at 30% 20%, color-mix(in srgb, var(--accent) 55%, transparent), transparent 65%), var(--bg-0); }
  .wp-swatch.wp-grid{ background: linear-gradient(var(--border-strong) 1px, transparent 1px) 0 0/9px 9px, linear-gradient(90deg,var(--border-strong) 1px, transparent 1px) 0 0/9px 9px, var(--bg-0); }

  /* ---------- GRID / ICONS ---------- */
  #gridLayer{
    position: relative;
    min-height: 100vh;
  }

  .icon{
    position: absolute;
    width: var(--cell-w);
    height: var(--cell-h);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding-top: 10px;
    border-radius: 12px;
    cursor: default;
    touch-action: none;
    transition: left .16s cubic-bezier(.2,.8,.3,1), top .16s cubic-bezier(.2,.8,.3,1), background .12s ease;
  }
  .icon.dragging{ transition: none; z-index: 50; opacity: 0.92; }
  .icon.dragging .glyph-wrap{ transform: none; }
  .icon.dragging .icon-glyph{ box-shadow: var(--shadow); }
  .icon:hover{ background: var(--surface); }
  .icon.selected{ background: var(--surface-selected); }
  .icon:hover .glyph-wrap{ transform: translateY(-3px); }
  .icon:hover .icon-glyph{ box-shadow: var(--shadow); }

  .glyph-wrap{ position: relative; transition: transform .16s cubic-bezier(.2,.8,.3,1); }
  .icon-glyph{
    width: var(--icon-size);
    height: var(--icon-size);
    border-radius: 13px;
    display:flex; align-items:center; justify-content:center;
    background: var(--surface);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-soft);
    position: relative;
    overflow: hidden;
    transition: transform .16s cubic-bezier(.2,.8,.3,1), box-shadow .16s ease;
  }
  .icon-glyph img{ width: 60%; height:60%; object-fit:contain; border-radius:4px; }
  .icon-glyph svg{ width: 60%; height: 60%; }
  .icon-glyph .letter{
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 20px;
    color: var(--text-primary);
  }
  .icon-glyph .count-badge{
    position: absolute; top: -4px; right: -4px;
    min-width: 16px; height: 16px; padding: 0 4px;
    border-radius: 8px;
    background: var(--bg-1);
    border: 1.5px solid var(--bg-0);
    color: var(--text-secondary);
    font-family: var(--font-mono);
    font-size: 9.5px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
    overflow: visible;
  }

  .icon-label{
    font-size: 11.5px;
    color: var(--text-primary);
    text-align: center;
    max-width: 92px;
    line-height: 1.25;
    padding: 2px 6px;
    border-radius: 5px;
    word-break: break-word;
    max-height: 2.6em;
    overflow: hidden;
  }
  .icon.selected .icon-label{ background: var(--accent); color: #fff; }
  .icon-label[contenteditable="true"]{
    background: var(--bg-1);
    color: var(--text-primary);
    outline: 1.5px solid var(--accent);
    user-select: text;
    -webkit-user-select: text;
    max-height: none;
    overflow: visible;
  }
  @media (max-width: 640px){
    .icon-label{ font-size: 10.5px; max-width: 70px; }
  }

  /* ---------- RUBBER BAND ---------- */
  #rubberband{
    position: absolute;
    border: 1px solid var(--accent);
    background: var(--surface-selected);
    display: none;
    z-index: 40;
    border-radius: 3px;
    pointer-events: none;
  }

  /* ---------- CONTEXT MENU ---------- */
  .ctx-menu{
    position: fixed;
    min-width: 190px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: var(--shadow);
    padding: 6px;
    z-index: 1000;
    backdrop-filter: blur(16px);
  }
  .ctx-item{
    padding: 8px 10px;
    font-size: 13px;
    color: var(--text-primary);
    border-radius: 7px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .ctx-item:hover{ background: var(--surface-hover); }
  .ctx-item.danger{ color: var(--danger); }
  .ctx-sep{ height:1px; background: var(--border); margin: 6px 4px; }
  .ctx-hint{ color: var(--text-tertiary); font-size: 11px; }

  /* ---------- FAB ---------- */
  #fab{
    position: fixed;
    right: calc(22px + var(--safe-right)); bottom: calc(22px + var(--safe-bottom));
    width: 50px; height: 50px;
    border-radius: 16px;
    background: var(--accent);
    color: #fff;
    display:flex; align-items:center; justify-content:center;
    box-shadow: var(--shadow);
    cursor: pointer;
    z-index: 600;
    transition: transform .1s ease, border-radius .15s ease, bottom .16s ease;
  }
  #fab:hover{ transform: translateY(-2px); }
  #fab:active{ transform: scale(0.94); }
  #fab svg{ width: 22px; height: 22px; }
  body.has-taskbar #fab{ bottom: calc(76px + var(--safe-bottom)); }

  /* ---------- STATUS ---------- */
  #status{
    position: fixed;
    left: calc(16px + var(--safe-left)); bottom: calc(16px + var(--safe-bottom));
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-tertiary);
    z-index: 400;
    transition: bottom .16s ease;
  }
  body.has-taskbar #status{ bottom: calc(68px + var(--safe-bottom)); }

  /* ---------- WINDOW MANAGER ---------- */
  #windowLayer{
    position: fixed;
    inset: 0;
    z-index: 90;
    pointer-events: none;
  }
  .oswindow{
    position: fixed;
    display: flex;
    flex-direction: column;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: var(--shadow);
    overflow: hidden;
    pointer-events: auto;
    min-width: 220px;
    min-height: 180px;
  }
  .oswindow-titlebar{
    flex-shrink: 0;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 8px 0 12px;
    background: var(--bg-0);
    border-bottom: 1px solid var(--border);
    cursor: default;
    touch-action: none;
    user-select: none;
  }
  .oswindow-title{
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text-primary);
    min-width: 0;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  .oswindow-icon{ width: 16px; height:16px; flex-shrink:0; display:flex; }
  .oswindow-icon svg{ width:16px; height:16px; }
  .oswindow-controls{ display:flex; align-items:center; gap:4px; flex-shrink:0; }
  .win-btn{
    width: 24px; height: 24px;
    border-radius: 7px;
    display:flex; align-items:center; justify-content:center;
    color: var(--text-secondary);
    font-size: 13px;
    line-height: 1;
    cursor: pointer;
  }
  .win-btn:hover{ background: var(--surface-hover); color: var(--text-primary); }
  .win-btn.win-close:hover{ background: var(--danger); color: #fff; }
  .oswindow-body{
    flex: 1;
    min-height: 0;
    overflow: auto;
    position: relative;
  }
  .oswindow-resize{
    position: absolute;
    right: 0; bottom: 0;
    width: 18px; height: 18px;
    cursor: nwse-resize;
    touch-action: none;
  }
  .oswindow-resize::after{
    content:"";
    position:absolute; right:4px; bottom:4px;
    width:8px; height:8px;
    border-right: 2px solid var(--border-strong);
    border-bottom: 2px solid var(--border-strong);
    border-radius: 0 0 2px 0;
  }

  /* ---------- TASKBAR ---------- */
  #taskbar{
    position: fixed;
    left: 0; right: 0; bottom: 0;
    height: calc(54px + var(--safe-bottom));
    padding-bottom: var(--safe-bottom);
    z-index: 480;
    display: none;
    align-items: center;
    gap: 8px;
    padding-left: calc(14px + var(--safe-left));
    padding-right: calc(14px + var(--safe-right));
    background: var(--bg-1);
    border-top: 1px solid var(--border);
    backdrop-filter: blur(16px);
    overflow-x: auto;
  }
  body.has-taskbar #taskbar{ display: flex; }
  .taskbar-pill{
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 7px;
    height: 36px;
    padding: 0 10px 0 8px;
    border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    max-width: 170px;
  }
  .taskbar-pill.active{ border-color: var(--border-strong); background: var(--surface-hover); }
  .taskbar-pill .tb-icon{ width:15px; height:15px; flex-shrink:0; display:flex; }
  .taskbar-pill .tb-icon svg{ width:15px; height:15px; }
  .taskbar-pill .tb-label{
    font-size: 12px; font-weight: 600; color: var(--text-primary);
    overflow:hidden; white-space:nowrap; text-overflow:ellipsis;
  }
  .taskbar-pill .tb-close{
    color: var(--text-tertiary);
    font-size: 11px;
    width: 16px; height:16px;
    border-radius: 5px;
    display:flex; align-items:center; justify-content:center;
    flex-shrink: 0;
  }
  .taskbar-pill .tb-close:hover{ background: var(--danger); color:#fff; }

  /* ---------- APP PICKER ---------- */
  #appPickerList{ max-height: 280px; overflow-y: auto; margin: 2px -2px; padding: 0 2px; }
  .app-pick-row{
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: 10px;
    cursor: pointer;
    margin-bottom: 4px;
  }
  .app-pick-row:hover{ background: var(--surface-hover); }
  .app-pick-icon{
    width: 34px; height: 34px;
    border-radius: 10px;
    display:flex; align-items:center; justify-content:center;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .app-pick-icon svg{ width: 20px; height: 20px; }
  .app-pick-row span{ font-size: 13px; font-weight: 600; color: var(--text-primary); }

  @media (max-width: 640px){
    .oswindow{ border-radius: 12px; }
    #taskbar{ height: calc(50px + var(--safe-bottom)); padding-left: calc(10px + var(--safe-left)); padding-right: calc(10px + var(--safe-right)); }
    .taskbar-pill{ max-width: 130px; height: 34px; }
    body.has-taskbar #fab{ bottom: calc(70px + var(--safe-bottom)); }
    body.has-taskbar #status{ bottom: calc(64px + var(--safe-bottom)); }
  }

  /* ---------- CALCULATOR APP ---------- */
  .calc{
    display: flex;
    flex-direction: column;
    height: 100%;
    background: var(--bg-1);
  }
  .calc-display{
    flex-shrink: 0;
    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
    padding: 18px 16px;
    min-height: 64px;
  }
  .calc-display-value{
    font-family: var(--font-mono);
    font-size: 34px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1;
    word-break: break-all;
    text-align: right;
    transition: font-size .1s ease;
  }
  .calc-grid{
    flex: 1;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(5, 1fr);
    gap: 1px;
    background: var(--border);
    border-top: 1px solid var(--border);
  }
  .calc-btn{
    border: none;
    background: var(--bg-1);
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .calc-btn:hover{ background: var(--surface-hover); }
  .calc-btn:active{ background: var(--surface-selected); }
  .calc-btn.calc-fn{ color: var(--text-secondary); }
  .calc-btn.calc-op{ color: var(--accent); font-size: 18px; }
  .calc-btn.calc-equals{ background: var(--accent); color: #fff; }
  .calc-btn.calc-equals:hover{ background: var(--accent-strong); }
  .calc-btn.calc-zero{ grid-column: span 2; }

  /* ---------- TODO APP ---------- */
  .todo-app{
    display: flex;
    flex-direction: column;
    height: 100%;
    background: var(--bg-1);
  }
  .todo-input-row{
    display: flex;
    gap: 8px;
    padding: 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .todo-input{
    flex: 1;
    min-width: 0;
    border: 1px solid var(--border-strong);
    background: var(--bg-0);
    color: var(--text-primary);
    border-radius: 9px;
    padding: 9px 11px;
    font-size: 13px;
    font-family: var(--font-body);
    outline: none;
  }
  .todo-input:focus{ outline: 1.5px solid var(--accent); }
  .todo-add-btn{
    width: 36px; height: 36px;
    border-radius: 9px;
    background: var(--accent);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    font-size: 18px;
    font-weight: 700;
  }
  .todo-add-btn:hover{ background: var(--accent-strong); }
  .todo-filters{
    display: flex;
    gap: 4px;
    padding: 8px 12px;
    flex-shrink: 0;
  }
  .todo-filter{
    border: none;
    background: var(--bg-0);
    color: var(--text-secondary);
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 700;
    padding: 6px 10px;
    border-radius: 7px;
    cursor: pointer;
  }
  .todo-filter.active{ background: var(--accent); color: #fff; }
  .todo-list{
    flex: 1;
    overflow-y: auto;
    padding: 2px 8px 8px;
  }
  .todo-item{
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 8px;
    border-radius: 9px;
    cursor: default;
  }
  .todo-item:hover{ background: var(--surface); }
  .todo-check{
    width: 18px; height: 18px;
    border-radius: 6px;
    border: 1.5px solid var(--border-strong);
    flex-shrink: 0;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .todo-item.done .todo-check{ background: var(--accent); border-color: var(--accent); }
  .todo-check svg{ width: 12px; height: 12px; opacity: 0; }
  .todo-item.done .todo-check svg{ opacity: 1; }
  .todo-text{
    flex: 1;
    min-width: 0;
    font-size: 13px;
    color: var(--text-primary);
    word-break: break-word;
    cursor: pointer;
  }
  .todo-item.done .todo-text{ color: var(--text-tertiary); text-decoration: line-through; }
  .todo-del{
    width: 22px; height: 22px;
    border-radius: 6px;
    color: var(--text-tertiary);
    font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    opacity: 0.4;
    flex-shrink: 0;
  }
  .todo-item:hover .todo-del{ opacity: 1; }
  .todo-del:hover{ background: var(--danger); color: #fff; }
  .todo-empty{
    text-align: center;
    color: var(--text-tertiary);
    font-size: 12.5px;
    margin-top: 40px;
    padding: 0 20px;
  }
  .todo-footer{
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 14px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .todo-count{ font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono); }
  .todo-clear{ font-size: 11px; color: var(--text-secondary); cursor: pointer; }
  .todo-clear:hover{ color: var(--text-primary); text-decoration: underline; }

  /* ---------- MODAL ---------- */
  .overlay{
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 2000;
  }
  .overlay.open{ display:flex; }
  .modal{
    width: 360px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    box-shadow: var(--shadow);
  }
  .modal h3{
    margin: 0 0 14px;
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 700;
  }
  .field{ margin-bottom: 12px; }
  .field label{
    display:block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-tertiary);
    font-weight: 700;
    margin-bottom: 6px;
  }
  .field input[type=text], .field input[type=url]{
    width: 100%;
    padding: 9px 11px;
    border-radius: 9px;
    border: 1px solid var(--border-strong);
    background: var(--bg-0);
    color: var(--text-primary);
    font-size: 13px;
    font-family: var(--font-body);
    user-select: text;
    -webkit-user-select: text;
  }
  .field input:focus{ outline: 1.5px solid var(--accent); }
  .colorpicks{ display:flex; gap:8px; }
  .colorpick{
    width: 26px; height: 26px; border-radius: 50%;
    cursor: pointer; border: 2px solid transparent;
  }
  .colorpick.active{ border-color: var(--text-primary); }
  .modal-actions{
    display:flex; justify-content:flex-end; gap:8px; margin-top: 16px;
  }
  .btn{
    padding: 8px 16px;
    border-radius: 9px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border-strong);
    background: transparent;
    color: var(--text-primary);
  }
  .btn.primary{
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn:hover{ opacity: 0.9; }

  /* ---------- FOLDER PANEL ---------- */
  #folderOverlay{
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    display:none;
    align-items: center; justify-content: center;
    z-index: 1500;
  }
  #folderOverlay.open{ display:flex; }
  #folderPanel{
    width: 560px;
    max-width: 92vw;
    height: 420px;
    max-height: 80vh;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 18px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #folderHeader{
    padding: 14px 18px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom: 1px solid var(--border);
  }
  #folderHeader h3{
    margin:0; font-family: var(--font-display); font-size: 14px; font-weight:700;
    display:flex; align-items:center; gap:8px;
  }
  #folderBody{
    position: relative;
    flex: 1;
    overflow: auto;
    padding: 20px;
  }
  #folderBody .empty-hint{
    color: var(--text-tertiary);
    font-size: 12.5px;
    text-align:center;
    margin-top: 60px;
  }

  /* ---------- EMPTY STATE ---------- */
  #emptyHint{
    position: fixed;
    top: 46%; left: 50%;
    transform: translate(-50%,-50%);
    text-align: center;
    color: var(--text-tertiary);
    font-size: 13px;
    pointer-events: none;
    z-index: 5;
    display: none;
  }
  #emptyHint b{ color: var(--text-secondary); }

  ::selection{ background: var(--accent); color:#fff; }
</style>
</head>

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><path d="m21 21-4.3-4.3"></path></svg>
      <input type="text" id="searchInput" placeholder="Search your desktop…" autocomplete="off">
    </div>
    <div class="iconbtn" id="searchGo" role="button" tabindex="0" title="Search" aria-label="Run search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"></path></svg>
    </div>
  </div>
</div>

<div id="desktop" role="main" aria-label="Desktop">
  <div id="gridLayer" role="group" aria-label="Desktop icons">
    <div id="rubberband"></div>
  </div>
</div>

<div id="emptyHint">Empty desktop.<br><b>Right-click</b> to add a bookmark or folder.</div>

<div id="status" aria-live="polite">0 items</div>

<div id="windowLayer"></div>
<div id="taskbar" role="toolbar" aria-label="Open windows"></div>

<div id="fab" role="button" tabindex="0" title="Add" aria-label="Add a bookmark">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"></path></svg>
</div>

<!-- Add / Edit Bookmark Modal -->
<div class="overlay" id="itemOverlay">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="itemModalTitle">
    <h3 id="itemModalTitle">New bookmark</h3>
    <div class="field" id="labelField">
      <label for="itemLabel">Name</label>
      <input type="text" id="itemLabel" placeholder="e.g. GitHub" autocomplete="off">
    </div>
    <div class="field" id="urlField">
      <label for="itemUrl">URL</label>
      <input type="url" id="itemUrl" placeholder="https://example.com" autocomplete="off">
    </div>
    <div class="field" id="colorField">
      <label id="colorFieldLabel">Color</label>
      <div class="colorpicks" id="colorPicks" role="group" aria-labelledby="colorFieldLabel"></div>
    </div>
